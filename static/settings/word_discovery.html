<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新词发现器 - 千言输入法</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .discover-layout { display: flex; flex-direction: column; gap: 20px; }
        .input-panel { flex: 1; min-width: 0; }
        .result-panel { flex: 1; min-width: 0; }
        .drop-zone { border: 2px dashed var(--apple-border); border-radius: 16px; padding: 40px; text-align: center; transition: all 0.2s; background: var(--apple-card-bg); cursor: pointer; margin-bottom: 12px; position: relative; }
        .drop-zone.hover { border-color: var(--apple-accent); background: rgba(0, 122, 255, 0.05); }
        .drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
        .drop-zone p { margin: 8px 0; color: var(--apple-secondary); }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; padding: 16px; border: 1px solid var(--apple-border); border-radius: 12px; background: var(--apple-card-bg); margin-bottom: 20px; }
        .config-item { display: flex; flex-direction: column; gap: 6px; }
        .config-item label { font-size: 12px; font-weight: 600; color: var(--apple-secondary); }
        .config-item input { height: 34px; padding: 0 10px; border: 1px solid var(--apple-border); border-radius: 6px; background: var(--apple-bg); color: var(--apple-text); }
        textarea { width: 100%; height: 160px; padding: 12px; border: 1px solid var(--apple-border); border-radius: 10px; font-size: 14px; font-family: inherit; resize: vertical; background: var(--apple-card-bg); color: var(--apple-text); box-sizing: border-box; }
        textarea:focus { outline: 2px solid var(--apple-accent); outline-offset: -1px; border-color: transparent; }
        .stats-bar { font-size: 12px; color: var(--apple-secondary); margin: 8px 0; }
        .dict-table-wrap { overflow-x: auto; border: 1px solid var(--apple-border); border-radius: 10px; max-height: 600px; overflow-y: auto; }
        .dict-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .dict-table th { position: sticky; top: 0; background: var(--apple-bg); padding: 10px 8px; font-weight: 600; border-bottom: 2px solid var(--apple-border); user-select: none; white-space: nowrap; z-index: 1; font-size: 12px; text-align: left; }
        .dict-table td { padding: 8px 8px; border-bottom: 1px solid var(--apple-border); vertical-align: middle; }
        .dict-table tr:hover td { background: var(--apple-hover); }
        .no-data { text-align: center; padding: 40px 20px; color: var(--apple-secondary); }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .tag-new { background: #ffd60a; color: #1a1a1a; }
        .tag-known { background: #e1e1e6; color: #666; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast.success { background: #34c759; color: #fff; }
        .toast.error { background: var(--apple-red); color: #fff; }
        .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 12px 16px; border: 1px solid var(--apple-border); border-radius: 12px; background: var(--apple-card-bg); margin-bottom: 12px; }
        .batch-bar { display: flex; gap: 12px; align-items: center; padding: 12px 16px; border: 1px solid var(--apple-border); border-radius: 12px; background: var(--apple-card-bg); margin-bottom: 12px; }
        .loader { width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid var(--apple-accent); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="btn-back">← 返回控制中心</a>
            <h1>新词发现器 V4</h1>
        </header>

        <div class="discover-layout">
            <div class="input-panel">
                <div class="config-grid">
                    <div class="config-item">
                        <label>最小词频</label>
                        <input type="number" id="cfg-min-count" value="5" min="1">
                    </div>
                    <div class="config-item">
                        <label>最小凝聚度 (PMI)</label>
                        <input type="number" id="cfg-min-pmi" value="3.0" step="0.1">
                    </div>
                    <div class="config-item">
                        <label>最小自由度 (熵)</label>
                        <input type="number" id="cfg-min-entropy" value="0.8" step="0.1">
                    </div>
                    <div class="config-item">
                        <label>最大词长</label>
                        <input type="number" id="cfg-max-len" value="4" min="2" max="10">
                    </div>
                </div>

                <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
                    <div class="icon">📄</div>
                    <p id="file-status">拖拽文件到此处，或点击选择文本文件 (.txt)</p>
                    <p style="font-size: 11px;">支持大文件 (44MB+) 和 GBK/UTF-8 自动识别，大文件分析可能需要几分钟，请耐心等待</p>
                    <input type="file" id="file-input" accept=".txt" style="display:none" onchange="handleFile(this.files[0])">
                </div>

                <div class="toolbar">
                    <span style="font-weight:600;">或者粘贴文本进行分析</span>
                    <button class="btn" onclick="discover(true)" style="background:var(--apple-accent);color:#fff;border:none;margin-left:auto;">🔍 开始分析</button>
                    <div id="loading-spinner" class="loader"></div>
                </div>
                <textarea id="input-text" placeholder="在此粘贴中文文本..."></textarea>
            </div>

            <div class="result-panel" id="result-panel" style="display:none;">
                <div class="batch-bar">
                    <span style="font-size:13px; font-weight:600;">找到 <span id="found-count">0</span> 个候选词，已选 <span id="selected-count">0</span> 个</span>
                    <div style="flex:1"></div>
                    <label style="font-size:12px; display:flex; align-items:center; gap:4px; cursor:pointer; margin-right:10px;">
                        <input type="checkbox" id="show-only-new" onchange="renderResults()"> 只看新词
                    </label>
                    <select id="export-format">
                        <option value="json">JSON 字典</option>
                        <option value="txt">TXT 列表</option>
                    </select>
                    <button class="btn" onclick="exportSelected()" style="background:var(--apple-accent);color:#fff;border:none;">📥 导出选中</button>
                </div>

                <div class="dict-table-wrap">
                    <table class="dict-table">
                        <thead>
                            <tr>
                                <th style="width: 40px; text-align: center;"><input type="checkbox" id="select-all" onchange="toggleAll()" checked></th>
                                <th>词汇</th>
                                <th>拼音</th>
                                <th>词频</th>
                                <th>凝聚度</th>
                                <th>自由度</th>
                            </tr>
                        </thead>
                        <tbody id="result-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let discoveredWords = [];
        let currentFile = null;

        // Drag and drop logic
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('hover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        function handleFile(file) {
            if (!file) return;
            if (analyzing) { showToast('正在分析中，请等待完成', 'error'); return; }
            if (!file.name.endsWith('.txt')) {
                showToast('请上传文本文件 (.txt)', 'error');
                return;
            }
            currentFile = file;
            document.getElementById('file-status').innerHTML = `<strong>已准备好分析: ${file.name}</strong> (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            document.getElementById('input-text').value = '';
            discover(false);
        }

        let analyzing = false;

        async function discover(useTextarea) {
            if (analyzing) return;
            const spinner = document.getElementById('loading-spinner');
            const resultPanel = document.getElementById('result-panel');
            const btn = document.querySelector('.toolbar .btn');
            const statusText = document.getElementById('file-status');
            
            let body = new FormData();
            
            if (useTextarea) {
                const text = document.getElementById('input-text').value.trim();
                if (text) {
                    const blob = new Blob([text], { type: 'text/plain' });
                    body.append('file', blob, 'pasted.txt');
                } else if (currentFile) {
                    body.append('file', currentFile);
                } else {
                    showToast('请输入文本或拖入文件', 'error');
                    return;
                }
            } else if (currentFile) {
                body.append('file', currentFile);
            } else {
                showToast('请先选择文件或输入文本', 'error');
                return;
            }

            const config = {
                min_count: parseInt(document.getElementById('cfg-min-count').value),
                min_pmi: parseFloat(document.getElementById('cfg-min-pmi').value),
                min_entropy: parseFloat(document.getElementById('cfg-min-entropy').value),
                max_word_len: parseInt(document.getElementById('cfg-max-len').value)
            };
            body.append('config', JSON.stringify(config));

            analyzing = true;
            spinner.style.display = 'inline-block';
            btn.disabled = true;
            btn.textContent = '分析中...';
            resultPanel.style.display = 'none';
            if (currentFile) {
                statusText.innerHTML = `<strong>正在分析 ${currentFile.name}...</strong> (${(currentFile.size / 1024 / 1024).toFixed(2)} MB，请耐心等待)`;
            } else {
                statusText.textContent = '正在分析中，请耐心等待...';
            }

            try {
                const r = await fetch('/api/tools/discover', {
                    method: 'POST',
                    body: body
                });
                
                if (!r.ok) {
                    const err = await r.text();
                    showToast('分析失败: ' + err, 'error');
                    return;
                }

                discoveredWords = await r.json();
                renderResults();
                resultPanel.style.display = 'block';
                showToast(`分析完成，发现 ${discoveredWords.length} 个新词`, 'success');
                if (currentFile) {
                    statusText.innerHTML = `<strong>已准备好分析: ${currentFile.name}</strong> (${(currentFile.size / 1024 / 1024).toFixed(2)} MB)`;
                }
            } catch (e) {
                showToast('分析异常: ' + e, 'error');
            } finally {
                analyzing = false;
                spinner.style.display = 'none';
                btn.disabled = false;
                btn.textContent = '🔍 开始分析';
            }
        }

        function renderResults() {
            const onlyNew = document.getElementById('show-only-new').checked;
            const filtered = onlyNew ? discoveredWords.filter(w => !w.in_dict) : discoveredWords;
            const tbody = document.getElementById('result-body');
            document.getElementById('found-count').textContent = filtered.length;

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="no-data">按当前配置未发现符合条件的新词</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map((w, idx) => {
                const realIdx = discoveredWords.indexOf(w);
                const tag = w.in_dict ? '<span class="tag tag-known">已知</span>' : '<span class="tag tag-new">新词</span>';
                return `<tr>
                    <td style="text-align: center;"><input type="checkbox" class="word-check" data-word="${escAttr(w.word)}" data-idx="${realIdx}" checked onchange="updateSelectCount()"></td>
                    <td style="font-weight:600;">${esc(w.word)} ${tag}</td>
                    <td>${w.pinyin || '-'}</td>
                    <td>${w.weight}</td>
                    <td>${w.pmi ? w.pmi.toFixed(2) : '-'}</td>
                    <td>${w.entropy ? w.entropy.toFixed(2) : '-'}</td>
                </tr>`;
            }).join('');

            updateSelectCount();
        }

        function toggleAll() {
            const checked = document.getElementById('select-all').checked;
            document.querySelectorAll('.word-check').forEach(cb => cb.checked = checked);
            updateSelectCount();
        }

        function updateSelectCount() {
            const checks = document.querySelectorAll('.word-check:checked');
            document.getElementById('selected-count').textContent = checks.length;
        }

        async function exportSelected() {
            const checks = document.querySelectorAll('.word-check:checked');
            if (checks.length === 0) { showToast('请选择要导出的词', 'error'); return; }

            const words = [], pinyins = [];
            checks.forEach(cb => {
                const idx = parseInt(cb.dataset.idx);
                words.push(cb.dataset.word);
                pinyins.push(discoveredWords[idx].pinyin);
            });

            const format = document.getElementById('export-format').value;

            try {
                const r = await fetch('/api/tools/discover/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ words, pinyins, format })
                });
                
                const blob = await r.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `qianyan_discovered_${new Date().getTime()}.${format}`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('导出成功', 'success');
            } catch (e) {
                showToast('导出失败', 'error');
            }
        }

        function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function escAttr(s) { if (!s) return ''; return s.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type + ' show';
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
