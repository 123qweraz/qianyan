<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统词典编辑器 - 千言输入法</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .editor-toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            padding: 12px 16px;
            border: 1px solid var(--apple-border);
            border-radius: 10px 10px 0 0;
            background: var(--apple-bg);
        }
        .editor-toolbar .file-label { font-weight: 600; font-size: 14px; margin-right: auto; }
        .dict-table-wrap { overflow-x: auto; border: 1px solid var(--apple-border); border-radius: 0 0 10px 10px; }
        .dict-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
        .dict-table th { position: sticky; top: 0; background: var(--apple-bg); padding: 10px 8px; font-weight: 600; border-bottom: 2px solid var(--apple-border); user-select: none; white-space: nowrap; z-index: 1; font-size: 12px; cursor: pointer; }
        .dict-table td { padding: 8px 8px; border-bottom: 1px solid var(--apple-border); vertical-align: middle; }
        .dict-table tr:hover td { background: var(--apple-hover); }
        .stats { font-size: 12px; color: var(--apple-secondary); }
        .add-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px 16px; border: 1px solid var(--apple-border); border-radius: 10px; background: var(--apple-card-bg); margin-bottom: 12px; }
        .add-bar .add-label { font-size: 12px; font-weight: 600; margin: 0 2px; }
        .add-bar input { background: #ffffff; border: 2px solid var(--apple-border); border-radius: 8px; padding: 6px 10px; font-size: 13px; outline: none; }
        .add-bar .btn { height: 32px; white-space: nowrap; }
        .pagination { display: flex; justify-content: center; gap: 6px; padding: 12px; }
        .pagination button { padding: 5px 12px; border: 1px solid var(--apple-border); border-radius: 6px; background: white; cursor: pointer; font-size: 12px; }
        .pagination button.active { background: var(--apple-accent); color: #fff; border-color: var(--apple-accent); }
        .pagination button:hover:not(.active) { border-color: var(--apple-accent); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }
        .toast.success { background: #34c759; color: #fff; }
        .toast.error { background: var(--apple-red); color: #fff; }
        .btn-outline { padding: 4px 10px; border: 1px solid var(--apple-border); border-radius: 6px; background: white; cursor: pointer; font-size: 12px; margin: 0 2px; }
        .btn-outline:hover { border-color: var(--apple-accent); color: var(--apple-accent); }
        .sort-arrow { font-size: 10px; }
        .back-link { font-size: 12px; color: var(--apple-secondary); text-decoration: none; }
        .back-link:hover { color: var(--apple-accent); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/static/settings/dictionary.html" class="btn-back" style="font-size:12px; padding:4px 12px;">← 返回词典列表</a>
            <h1>词典编辑器</h1>
        </header>

        <div id="no-file-selected" style="display:none; text-align:center; padding:60px 20px; color:var(--apple-secondary);">
            请在<a href="/static/settings/dictionary.html" style="color:var(--apple-accent);">词典列表</a>中选择一个文件
        </div>

        <div id="editor-content">
            <div class="editor-toolbar">
                <span class="file-label" id="current-file-label">加载中...</span>
                <span class="file-label" id="current-file-size" style="font-size:11px; color:var(--apple-secondary); font-weight:400;"></span>
                <div style="display:flex; gap:4px; align-items:center; flex:1; min-width:160px;">
                    <input type="text" id="search-input" placeholder="搜索..." oninput="scheduleSearch()" style="flex:1; min-width:80px; height:30px;">
                    <select id="search-type" onchange="scheduleSearch()" style="height:30px; padding:0 6px; border:1px solid var(--apple-border); border-radius:6px; font-size:12px; background:white; color:var(--apple-text);">
                        <option value="all">全部</option>
                        <option value="pinyin">拼音</option>
                        <option value="word">汉字</option>
                        <option value="en">英文</option>
                        <option value="stroke_aux">辅码</option>
                    </select>
                </div>
                <span class="stats" id="stats-bar"></span>
                <a href="/static/settings/dictionary.html" class="back-link">词库列表</a>
            </div>

            <div class="add-bar" id="add-bar">
                <span class="add-label">拼音</span>
                <input type="text" id="add-pinyin" placeholder="ji" style="width:80px;">
                <span class="add-label">词汇</span>
                <input type="text" id="add-char" placeholder="机" style="width:80px;">
                <span class="add-label">英文</span>
                <input type="text" class="add-en" id="add-en" placeholder="Machine" style="width:100px;">
                <span class="add-label">权重</span>
                <input type="number" id="add-weight" value="50000" style="width:70px;">
                <span class="add-label">辅码</span>
                <input type="text" id="add-stroke" placeholder="Mf" style="width:55px;">
                <button class="btn" onclick="addEntry()" style="height:30px; font-size:13px; padding:4px 14px;">添加</button>
            </div>

            <div class="dict-table-wrap">
                <table class="dict-table" id="dict-table">
                    <thead>
                        <tr>
                            <th onclick="sortBy('pinyin')" id="th-pinyin" class="left">拼音 <span class="sort-arrow">▲</span></th>
                            <th onclick="sortBy('word')" id="th-word" class="left">词汇 <span class="sort-arrow">▲</span></th>
                            <th onclick="sortBy('en')" id="th-en" class="left">释义 <span class="sort-arrow">▲</span></th>
                            <th onclick="sortBy('weight')" id="th-weight" class="center">权重 <span class="sort-arrow">▲</span></th>
                            <th class="center">辅码</th>
                            <th class="center">繁体</th>
                            <th class="center">分类</th>
                            <th class="center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/static/js/settings.js"></script>
    <script>
        let currentFile = '';
        let currentPage = 1;
        let currentSearch = '';
        let currentSortBy = 'pinyin';
        let currentSortOrder = 'asc';
        let totalEntries = 0;
        let totalPages = 1;
        let pageSize = 20;
        let searchTimer = null;
        let editingRow = null;
        let deletedEntry = null;

        function getDictName(filePath) {
            const name = (filePath.split('/').pop() || filePath).replace(/\.json(\.disabled)?$/, '');
            const parts = filePath.split('/');
            const group = parts.length >= 2 ? parts[parts.length - 2] : '';
            return group ? `${group}/${name}` : name;
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const file = params.get('file');
            if (!file) {
                document.getElementById('no-file-selected').style.display = 'block';
                document.getElementById('editor-content').style.display = 'none';
                return;
            }
            currentFile = file;
            document.getElementById('no-file-selected').style.display = 'none';
            document.getElementById('editor-content').style.display = 'block';
            document.getElementById('current-file-label').textContent = getDictName(file);

            // Show file info from dicts API
            try {
                const r = await fetch('/api/dicts');
                const dicts = await r.json();
                const info = dicts.find(d => d.path === file);
                if (info) {
                    document.getElementById('current-file-size').textContent =
                        `(${info.entry_count.toLocaleString()} 条, ${(info.size/1024).toFixed(1)} KB)`;
                }
            } catch(_) {}

            // Pre-fill search if provided via URL params
            const search = params.get('search');
            const searchBy = params.get('search_by');
            if (search) {
                document.getElementById('search-input').value = search;
                if (searchBy) document.getElementById('search-type').value = searchBy;
                currentSearch = search;
                loadPage(1);
                return;
            }

            loadPage(1);
        }

        // ===== Search / Sort / Paginate =====

        function scheduleSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                currentSearch = document.getElementById('search-input').value;
                currentPage = 1;
                loadPage(1);
            }, 300);
        }

        function sortBy(field) {
            if (currentSortBy === field) { currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc'; }
            else { currentSortBy = field; currentSortOrder = 'asc'; }
            currentPage = 1;
            loadPage(1);
            document.querySelectorAll('.sort-arrow').forEach(s => s.textContent = '▲');
            document.getElementById('th-' + field + ' .sort-arrow').textContent = currentSortOrder === 'asc' ? '▲' : '▼';
        }

        async function loadPage(page) {
            currentPage = page;
            const params = new URLSearchParams({
                file: currentFile, page, page_size: pageSize,
                sort_by: currentSortBy, sort_order: currentSortOrder,
                search: currentSearch,
                search_by: document.getElementById('search-type').value,
            });
            const r = await fetch('/api/dict/browse?' + params);
            const data = await r.json();
            totalEntries = data.total;
            totalPages = data.total_pages;
            document.getElementById('stats-bar').textContent = `${data.total} 条 / ${totalPages} 页`;
            renderTable(data.entries);
            renderPagination();
        }

        function renderTable(entries) {
            const tbody = document.getElementById('table-body');
            if (entries.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:40px; color:var(--apple-secondary);">暂无数据</td></tr>`;
                return;
            }
            tbody.innerHTML = entries.map((e) => {
                if (editingRow === e.id) {
                    return `<tr>
                        <td class="left">${esc(e.pinyin)}</td>
                        <td class="left"><input type="text" id="edit-word" value="${esc_attr(e.word)}" style="width:90px;"></td>
                        <td class="left"><input type="text" id="edit-en" value="${esc_attr(e.en||'')}" style="width:110px;"></td>
                        <td class="center"><input type="number" id="edit-weight" value="${e.weight}" style="width:70px;"></td>
                        <td class="center"><input type="text" id="edit-stroke" value="${esc_attr(e.stroke_aux||'')}" style="width:55px;"></td>
                        <td class="center"><input type="text" id="edit-trad" value="${esc_attr(e.trad||'')}" style="width:90px;"></td>
                        <td class="center"><input type="text" id="edit-category" value="${esc_attr(e.category||'')}" style="width:70px;"></td>
                        <td class="center">
                            <button class="btn-outline" onclick="saveEdit('${e.id}')">💾</button>
                            <button class="btn-outline" onclick="cancelEdit()">✕</button>
                        </td>
                    </tr>`;
                }
                return `<tr>
                    <td class="left" style="font-family:monospace;font-size:12px;">${esc(e.pinyin)}</td>
                    <td class="left" style="font-weight:600;">${esc(e.word)}</td>
                    <td class="left" style="font-size:12px; color:var(--apple-secondary);">${esc(e.en||'')}</td>
                    <td class="center">${e.weight}</td>
                    <td class="center" style="font-family:monospace;font-size:11px;">${esc(e.stroke_aux||'')}</td>
                    <td class="center">${esc(e.trad||'')}</td>
                    <td class="center" style="font-size:11px; color:var(--apple-secondary);">${esc(e.category||'')}</td>
                    <td class="center">
                        <button class="btn-outline" onclick="undoDelete('${e.id}')" id="undo-${e.id}" style="display:none;">↩ 撤销</button>
                        <button class="btn-outline" id="edit-${e.id}" onclick="startEdit('${e.id}')">✎</button>
                        <button class="btn-outline" id="del-${e.id}" onclick="deleteEntry('${e.id}')" style="color:var(--apple-red);">✕</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function renderPagination() {
            const el = document.getElementById('pagination');
            if (totalPages <= 1) { el.innerHTML = ''; return; }
            let html = '';
            const start = Math.max(1, currentPage - 3);
            const end = Math.min(totalPages, currentPage + 3);
            if (start > 1) html += `<button onclick="loadPage(1)">1</button>...`;
            for (let i = start; i <= end; i++) {
                html += `<button class="${i===currentPage?'active':''}" onclick="loadPage(${i})">${i}</button>`;
            }
            if (end < totalPages) html += `...<button onclick="loadPage(${totalPages})">${totalPages}</button>`;
            el.innerHTML = html;
        }

        // ===== CRUD =====

        async function addEntry() {
            const pinyin = document.getElementById('add-pinyin').value.trim().toLowerCase();
            const word = document.getElementById('add-char').value.trim();
            if (!pinyin || !word) { showToast('拼音和词汇不能为空', 'error'); return; }
            const en = document.getElementById('add-en').value.trim();
            const weight = parseInt(document.getElementById('add-weight').value) || 50000;
            const stroke = document.getElementById('add-stroke').value.trim();
            const r = await fetch('/api/dict/entry/add', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pinyin, word, en, weight, stroke_aux: stroke, file: currentFile })
            });
            if (r.ok) { showToast('已添加', 'success'); loadPage(currentPage); }
            else if (r.status === 409) { showToast('该词已存在', 'error'); }
            else { showToast('添加失败', 'error'); }
        }

        function startEdit(id) {
            editingRow = id;
            loadPage(currentPage);
        }

        function cancelEdit() { editingRow = null; loadPage(currentPage); }

        async function saveEdit(id) {
            const word = document.getElementById('edit-word').value.trim();
            const en = document.getElementById('edit-en').value.trim();
            const weight = parseInt(document.getElementById('edit-weight').value) || 0;
            const stroke = document.getElementById('edit-stroke').value.trim();
            const trad = document.getElementById('edit-trad').value.trim();
            const category = document.getElementById('edit-category').value.trim();
            const r = await fetch('/api/dict/entry/update', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file: currentFile, pinyin: id.split('::')[0], word: id.split('::')[1], en, weight, stroke_aux: stroke, trad, category })
            });
            editingRow = null;
            showToast(r.ok ? '已保存' : '保存失败', r.ok ? 'success' : 'error');
            loadPage(currentPage);
        }

        async function deleteEntry(id) {
            const [pinyin, word] = id.split('::');
            const r = await fetch('/api/dict/entry/delete', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file: currentFile, pinyin, word })
            });
            if (r.ok) {
                deletedEntry = { file: currentFile, pinyin, word };
                showToast('已删除，可撤销', 'success');
                document.getElementById('undo-'+id).style.display = 'inline';
                document.getElementById('edit-'+id).style.display = 'none';
                document.getElementById('del-'+id).style.display = 'none';
            } else { showToast('删除失败', 'error'); }
        }

        async function undoDelete(id) {
            if (!deletedEntry) return;
            const r = await fetch('/api/dict/entry/add', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...deletedEntry, en: '', weight: 50000 })
            });
            showToast(r.ok ? '已恢复' : '恢复失败', r.ok ? 'success' : 'error');
            loadPage(currentPage);
        }

        function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function esc_attr(s) { if (!s) return ''; return s.replace(/"/g,'&quot;'); }

        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + (type||'') + ' show';
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), 2500);
        }

        init();
    </script>
</body>
</html>
