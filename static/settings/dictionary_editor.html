<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统词典编辑器 - 千言输入法</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .editor-layout { display: flex; gap: 20px; align-items: flex-start; }
        .dict-sidebar {
            width: 320px; flex-shrink: 0;
            border: 1px solid var(--apple-border);
            border-radius: 10px;
            background: var(--apple-card-bg);
            overflow: hidden;
        }
        .dict-sidebar-header {
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--apple-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dict-sidebar-list { max-height: 500px; overflow-y: auto; padding: 4px 0; }
        .dict-sidebar-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.1s;
        }
        .dict-sidebar-item:hover { background: var(--apple-hover); }
        .dict-sidebar-item.active {
            background: rgba(0,122,255,0.08);
            border-left-color: var(--apple-accent);
        }
        .dict-sidebar-item.disabled { opacity: 0.5; }
        .dict-sidebar-item .dict-name { font-size: 13px; font-weight: 500; }
        .dict-sidebar-item .dict-count { font-size: 11px; color: var(--apple-secondary); }
        .dict-sidebar-item .dict-toggle { margin-left: 8px; transform: scale(0.8); }

        .editor-main { flex: 1; min-width: 0; }

        .editor-toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            padding: 10px 14px;
            border: 1px solid var(--apple-border);
            border-radius: 10px;
            background: var(--apple-card-bg);
            margin-bottom: 10px;
            min-height: 40px;
        }
        .editor-toolbar .file-label {
            font-weight: 600;
            font-size: 14px;
            line-height: 34px;
        }
        .editor-toolbar input[type="text"] {
            flex: 1;
            min-width: 160px;
            height: 34px;
            padding: 0 10px;
            border: 1px solid var(--apple-border);
            border-radius: 6px;
            font-size: 13px;
            background: var(--apple-bg);
            color: var(--apple-text);
            box-sizing: border-box;
        }
        .editor-toolbar .stats {
            font-size: 12px;
            color: var(--apple-secondary);
            white-space: nowrap;
        }

        .dict-table-wrap {
            overflow-x: auto;
            border: 1px solid var(--apple-border);
            border-radius: 10px;
        }
        .dict-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 500px;
        }
        .dict-table th {
            position: sticky;
            top: 0;
            background: var(--apple-bg);
            padding: 6px 4px;
            font-weight: 600;
            border-bottom: 2px solid var(--apple-border);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            z-index: 1;
            font-size: 12px;
        }
        .dict-table th:hover { color: var(--apple-accent); }
        .dict-table th .sort-arrow { margin-left: 3px; opacity: 0.4; font-size: 10px; }
        .dict-table th.sorted .sort-arrow { opacity: 1; color: var(--apple-accent); }
        .dict-table th.center, .dict-table td.center { text-align: center; }
        .dict-table th.left, .dict-table td.left { text-align: left; }
        .dict-table td {
            padding: 4px 4px;
            border-bottom: 1px solid var(--apple-border);
            vertical-align: middle;
        }
        .dict-table tr:hover td { background: var(--apple-hover); }

        .row-actions { display: flex; gap: 3px; }
        .row-actions button {
            padding: 3px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: opacity 0.15s;
        }
        .row-actions .btn-save { background: var(--apple-accent); color: #fff; }
        .row-actions .btn-cancel { background: var(--apple-border); color: var(--apple-text); }
        .row-actions .btn-delete { background: transparent; color: var(--apple-red); padding: 3px 5px; }
        .row-actions button:hover { opacity: 0.8; }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            padding: 12px 0;
        }
        .pagination button {
            padding: 4px 10px;
            border: 1px solid var(--apple-border);
            border-radius: 4px;
            background: var(--apple-card-bg);
            color: var(--apple-text);
            cursor: pointer;
            font-size: 12px;
        }
        .pagination button:hover { background: var(--apple-hover); }
        .pagination button.active {
            background: var(--apple-accent);
            color: #fff;
            border-color: var(--apple-accent);
        }
        .pagination button:disabled { opacity: 0.4; cursor: default; }
        .pagination .page-info { font-size: 12px; color: var(--apple-secondary); margin: 0 6px; }

        .add-bar {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            padding: 8px 0;
        }
        .add-bar input, .add-bar select {
            height: 32px;
            padding: 0 8px;
            border: 1px solid var(--apple-border);
            border-radius: 6px;
            font-size: 12px;
            background: var(--apple-card-bg);
            color: var(--apple-text);
            box-sizing: border-box;
        }
        .add-bar input { width: 85px; }
        .add-bar input.add-en { width: 110px; }
        .add-bar .add-label { font-size: 11px; color: var(--apple-secondary); }

        .row-editing { background: #f0f7ff !important; }
        .btn-edit-row { background: transparent; color: var(--apple-accent); padding: 3px 8px; border: 1px solid var(--apple-accent); border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-edit-row:hover { background: var(--apple-accent); color: #fff; }
        .view-mode { cursor: default; }
        .edit-mode { width: 100%; border: 1px solid var(--apple-border); border-radius: 4px; padding: 2px 4px; font-size: 12px; font-family: inherit; background: #fff; color: var(--apple-text); box-sizing: border-box; min-width: 50px; }
        .edit-mode:focus { outline: 2px solid var(--apple-accent); outline-offset: -1px; border-color: transparent; }

        .cell-word { font-weight: 600; }
        .cell-en { color: var(--apple-secondary); font-size: 11px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cell-weight { font-variant-numeric: tabular-nums; }
        .cell-pinyin { font-family: monospace; font-size: 11px; }
        .no-data { text-align: center; padding: 40px 20px; color: var(--apple-secondary); }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }
        .toast.success { background: #34c759; color: #fff; }
        .toast.error { background: var(--apple-red); color: #fff; }

        .sidebar-actions { padding: 10px 12px; border-top: 1px solid var(--apple-border); display: flex; gap: 6px; flex-wrap: wrap; }
        .sidebar-actions .btn { font-size: 12px; padding: 5px 10px; flex: 1; text-align: center; min-width: 0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="btn-back">← 返回控制中心</a>
            <h1>系统词典编辑器</h1>
        </header>

        <div class="editor-layout">
            <div class="dict-sidebar">
                <div class="dict-sidebar-header">
                    <span>词库列表</span>
                    <span class="stats" id="sidebar-stats"></span>
                </div>
                <div class="dict-sidebar-list" id="dicts-list"></div>
                <div style="padding:8px 16px; border-top:1px solid var(--apple-border);">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-size:12px; color:var(--apple-secondary);">用户词典</div>
                        <a href="/static/settings/user_dict_editor.html" class="btn" style="font-size:11px; padding:2px 8px; background:var(--apple-accent);color:#fff;border:none;text-decoration:none;border-radius:4px;">管理 →</a>
                    </div>
                    <div style="font-size:11px; color:var(--apple-secondary); margin-top:4px;">查看、删除、导出用户自造词</div>
                </div>
                <div class="sidebar-actions">
                    <button class="btn" onclick="openDictsDir()" style="background:var(--apple-accent);color:#fff;border:none;">📂 打开词典目录</button>
                    <button class="btn" onclick="createDict()">+ 新建</button>
                    <button class="btn" onclick="compileDict()">编译</button>
                    <button class="btn" onclick="refresh()">刷新</button>
                </div>
            </div>

            <div class="editor-main">
                <div id="no-file-selected" style="display:none; text-align:center; padding:60px 20px; color:var(--apple-secondary);">
                    请在左侧选择一个词典文件
                </div>



                <div id="editor-content">
                    <div class="editor-toolbar">
                        <span class="file-label" id="current-file-label">未选择</span>
                        <div style="display:flex; gap:4px; align-items:center; flex:1; min-width:160px;">
                            <input type="text" id="search-input" placeholder="搜索..." oninput="scheduleSearch()" style="flex:1; min-width:80px;">
                            <select id="search-type" onchange="scheduleSearch()" style="height:34px; padding:0 6px; border:1px solid var(--apple-border); border-radius:6px; font-size:12px; background:var(--apple-bg); color:var(--apple-text);">
                                <option value="all">全部</option>
                                <option value="pinyin">拼音</option>
                                <option value="word">汉字</option>
                                <option value="en">英文</option>
                            </select>
                        </div>
                        <span class="stats" id="stats-bar"></span>
                    </div>

                    <div class="add-bar" id="add-bar">
                        <span class="add-label">拼音</span>
                        <input type="text" id="add-pinyin" placeholder="ji">
                        <span class="add-label">词汇</span>
                        <input type="text" id="add-char" placeholder="机">
                        <span class="add-label">英文</span>
                        <input type="text" class="add-en" id="add-en" placeholder="Machine">
                        <span class="add-label">权重</span>
                        <input type="number" id="add-weight" value="50000" style="width:75px;">
                        <span class="add-label">辅码</span>
                        <input type="text" id="add-stroke" placeholder="Mf" style="width:55px;">
                        <button class="btn" onclick="addEntry()" style="height:32px; white-space:nowrap;">添加</button>
                    </div>

                    <div class="dict-table-wrap">
                        <table class="dict-table" id="dict-table">
                            <thead>
                                <tr>
                                    <th onclick="sortBy('pinyin')" id="th-pinyin" class="left">拼音 <span class="sort-arrow">▲</span></th>
                                    <th onclick="sortBy('word')" id="th-word" class="left">词汇 <span class="sort-arrow">▲</span></th>
                                    <th onclick="sortBy('en')" id="th-en" class="left">释义 <span class="sort-arrow">▲</span></th>
                                    <th onclick="sortBy('weight')" id="th-weight" class="center">权重 <span class="sort-arrow">▲</span></th>
                                    <th class="center">辅码</th>
                                    <th class="center">繁体</th>
                                    <th class="center">分类</th>
                                    <th class="center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/static/js/settings.js"></script>
    <script>
        let currentFile = '';
        let currentPage = 1;
        let currentSearch = '';
        let currentSortBy = 'pinyin';
        let currentSortOrder = 'asc';
        let totalEntries = 0;
        let totalPages = 1;
        let pageSize = 20;
        let searchTimer = null;
        let editingRow = null;
        let deletedEntry = null;
        let dictsCache = [];

        function getDictName(filePath) {
            return (filePath.split('/').pop() || filePath).replace(/\.json(\.disabled)?$/, '');
        }

        async function init() {
            await refreshDictList();
        }

        async function refreshDictList() {
            const r = await fetch('/api/dicts');
            const dicts = await r.json();
            dictsCache = dicts;
            renderSidebar(dicts);
            let savedFile = localStorage.getItem('dict_editor_last_file');
            // 清除 localStorage 里不再存在的词典路径
            if (savedFile && !dicts.some(d => d.path === savedFile)) {
                localStorage.removeItem('dict_editor_last_file');
                savedFile = null;
            }
            if (savedFile) {
                selectFile(savedFile);
            } else if (dicts.length > 0) {
                selectFile(dicts[0].path);
            } else {
                document.getElementById('no-file-selected').style.display = 'block';
                document.getElementById('editor-content').style.display = 'none';
            }
            document.getElementById('sidebar-stats').textContent = dicts.length + ' 个';
        }

        function renderSidebar(dicts) {
            const groups = {};
            dicts.forEach(d => {
                if (!groups[d.group]) groups[d.group] = [];
                groups[d.group].push(d);
            });
            const container = document.getElementById('dicts-list');
            container.innerHTML = Object.entries(groups).sort().map(([group, files]) => {
                const label = { chinese: '中文', english: '英文', japanese: '日文', stroke: '笔画', user: '用户' }[group] || group;
                return `
                    <div style="padding:6px 16px 2px; font-size:11px; color:var(--apple-accent); font-weight:600;">${label}</div>
                    ${files.map(f => `
                        <div class="dict-sidebar-item ${f.enabled?'':'disabled'} ${f.path===currentFile?'active':''}"
                             onclick="selectFile('${f.path}')">
                            <div>
                                <div class="dict-name">${f.name.replace('.disabled','')}</div>
                                <div class="dict-count">${f.entry_count.toLocaleString()} 条</div>
                            </div>
                            <label class="switch dict-toggle" onclick="event.stopPropagation()">
                                <input type="checkbox" ${f.enabled?'checked':''} onchange="toggleDict('${f.path}')">
                                <span class="slider"></span>
                            </label>
                        </div>
                    `).join('')}
                `;
            }).join('');
        }

        function selectFile(path) {
            currentFile = path;
            localStorage.setItem('dict_editor_last_file', path);
            document.getElementById('no-file-selected').style.display = 'none';
            document.getElementById('editor-content').style.display = 'block';
            document.getElementById('current-file-label').textContent = getDictName(path);
            document.getElementById('search-input').value = '';
            document.getElementById('search-type').value = 'all';
            currentSearch = '';
            currentPage = 1;
            renderSidebar(dictsCache);
            loadPage(1);
        }

        async function toggleDict(path) {
            await fetch('/api/dicts/toggle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path })
            });
            await refreshDictList();
            showToast('词典状态已更新', 'success');
        }

        async function createDict() {
            const name = prompt('请输入词典名称（英文，如 my_words）：');
            if (!name || !name.match(/^[a-zA-Z0-9_-]+$/)) {
                showToast('名称只能包含英文、数字、下划线和连字符', 'error');
                return;
            }
            const group = prompt('请输入分类（中文/英文/日文/笔画/用户，默认 user）：') || 'user';
            const r = await fetch('/api/dicts/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, group })
            });
            if (r.ok) {
                showToast('空白词典已创建', 'success');
                await refreshDictList();
            } else if (r.status === 409) {
                showToast('同名词典已存在', 'error');
            } else {
                showToast('创建失败', 'error');
            }
        }

        async function clearUserDict() {
            if (!confirm('确定要清空所有用户词库数据吗？此操作无法撤销。')) return;
            const res = await fetch('/api/dict/clear_user', { method: 'POST' });
            showToast(res.ok ? '用户词典已清空' : '清空失败', res.ok ? 'success' : 'error');
        }

        function scheduleSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                currentSearch = document.getElementById('search-input').value;
                currentPage = 1;
                loadPage(1);
            }, 300);
        }

        async function loadPage(page) {
            currentPage = page;
            const searchBy = document.getElementById('search-type')?.value || 'all';
            const params = new URLSearchParams({
                file: currentFile,
                page: currentPage,
                page_size: pageSize,
                search: currentSearch,
                sort_by: currentSortBy,
                sort_order: currentSortOrder,
                search_by: searchBy,
            });
            const r = await fetch(`/api/dict/browse?${params}`);
            if (!r.ok) {
                document.getElementById('table-body').innerHTML =
                    '<tr><td colspan="8" class="no-data">无法加载词典文件</td></tr>';
                return;
            }
            const data = await r.json();
            totalEntries = data.total;
            totalPages = data.total_pages;
            editingRow = null;
            renderTable(data.entries);
            renderPagination();
            updateStats();
        }

        function renderTable(entries) {
            const tbody = document.getElementById('table-body');
            if (entries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-data">没有找到匹配的词条</td></tr>';
                return;
            }
            tbody.innerHTML = entries.map((e, idx) => {
                const uid = `${e.pinyin}|${e.word}|${idx}`;
                return `<tr id="row-${idx}" data-uid="${uid}">
                    <td class="cell-pinyin left">${esc(e.pinyin)}</td>
                    <td class="cell-word left">${esc(e.word)}</td>
                    <td class="cell-en left">${esc(e.en || '-')}</td>
                    <td class="center cell-weight">
                        <span class="view-mode" id="weight-${idx}">${(e.weight||0).toLocaleString()}</span>
                        <input type="number" class="edit-mode" id="input-weight-${idx}" value="${e.weight||0}" style="display:none; width:70px;">
                    </td>
                    <td class="center">
                        <span class="view-mode" id="stroke_aux-${idx}">${esc(e.stroke_aux || '-')}</span>
                        <input class="edit-mode" id="input-stroke_aux-${idx}" value="${escAttr(e.stroke_aux || '')}" style="display:none; width:50px;">
                    </td>
                    <td class="center">
                        <span class="view-mode" id="trad-${idx}">${esc(e.trad || '-')}</span>
                        <input class="edit-mode" id="input-trad-${idx}" value="${escAttr(e.trad || '')}" style="display:none; width:60px;">
                    </td>
                    <td class="center">
                        <span class="view-mode" id="category-${idx}">${esc(e.category || '-')}</span>
                        <input class="edit-mode" id="input-category-${idx}" value="${escAttr(e.category || '')}" style="display:none; width:60px;">
                    </td>
                    <td class="center">
                        <div class="row-actions" style="justify-content:center;">
                            <button class="btn-edit-row view-mode" id="edit-${idx}" onclick="startEditRow(${idx})">编辑</button>
                            <button class="btn-save edit-mode" id="save-${idx}" style="display:none;" onclick="saveEditRow(${idx})">保存</button>
                            <button class="btn-cancel edit-mode" id="cancel-${idx}" style="display:none;" onclick="cancelEditRow(${idx})">取消</button>
                            <button class="btn-delete" id="del-${idx}" onclick="deleteEntry(${idx})" title="删除">✕</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function startEditRow(idx) {
            if (editingRow !== null && editingRow !== idx) cancelEditRow(editingRow);
            editingRow = idx;
            const row = document.getElementById(`row-${idx}`);
            row.classList.add('row-editing');
            row.querySelectorAll('.view-mode').forEach(el => el.style.display = 'none');
            row.querySelectorAll('.edit-mode').forEach(el => el.style.display = '');
            document.getElementById(`edit-${idx}`).style.display = 'none';
            document.getElementById(`save-${idx}`).style.display = '';
            document.getElementById(`cancel-${idx}`).style.display = '';
            const firstInput = row.querySelector('.edit-mode');
            if (firstInput) firstInput.focus();
        }

        function cancelEditRow(idx) {
            const row = document.getElementById(`row-${idx}`);
            if (!row) return;
            editingRow = null;
            row.classList.remove('row-editing');
            row.querySelectorAll('.view-mode').forEach(el => el.style.display = '');
            row.querySelectorAll('.edit-mode').forEach(el => el.style.display = 'none');
            document.getElementById(`edit-${idx}`).style.display = '';
            document.getElementById(`save-${idx}`).style.display = 'none';
            document.getElementById(`cancel-${idx}`).style.display = 'none';
        }

        async function saveEditRow(idx) {
            const row = document.getElementById(`row-${idx}`);
            if (!row) return;
            const parts = row.dataset.uid.split('|');
            const pinyin = parts[0];
            const word = parts[1];

            const fields = ['en', 'weight', 'stroke_aux', 'trad', 'tone', 'category'];
            const body = { pinyin, word, file: currentFile };
            let changed = false;

            for (const field of fields) {
                const input = document.getElementById(`input-${field}-${idx}`);
                if (!input) continue;
                const newVal = input.value.trim();
                const origVal = input.defaultValue;
                if (field === 'weight') {
                    const numVal = parseInt(newVal) || 0;
                    if (numVal !== parseInt(origVal)) { body[field] = numVal; changed = true; }
                } else if (newVal !== origVal) { body[field] = newVal || null; changed = true; }
            }

            if (!changed) { cancelEditRow(idx); return; }

            const r = await fetch('/api/dict/entry/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (r.ok) {
                showToast(`已保存至 ${getDictName(currentFile)}`, 'success');
                editingRow = null;
                loadPage(currentPage);
            } else {
                showToast('更新失败', 'error');
                cancelEditRow(idx);
            }
        }

        async function deleteEntry(idx) {
            const row = document.getElementById(`row-${idx}`);
            if (!row) return;
            const parts = row.dataset.uid.split('|');
            const pinyin = parts[0], word = parts[1];
            if (!confirm(`确定要删除 "${word}" (${pinyin}) 吗？`)) return;
            const r = await fetch('/api/dict/entry/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pinyin, word, file: currentFile })
            });
            if (r.ok) {
                deletedEntry = { pinyin, word, file: currentFile };
                const undoBtn = document.createElement('button');
                undoBtn.textContent = '撤销';
                undoBtn.className = 'btn';
                undoBtn.style.cssText = 'margin-left:12px; padding:4px 12px; font-size:13px; background:#fff; color:var(--apple-accent); border:1px solid var(--apple-accent); border-radius:6px; cursor:pointer;';
                undoBtn.onclick = () => undoDelete();
                showToastWithAction(`已删除 "${word}"`, undoBtn);
                loadPage(currentPage);
            } else {
                showToast('删除失败', 'error');
            }
        }

        async function undoDelete() {
            if (!deletedEntry) return;
            const r = await fetch('/api/dict/entry/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pinyin: deletedEntry.pinyin, word: deletedEntry.word, file: deletedEntry.file })
            });
            showToast(r.ok ? '已恢复' : '恢复失败', r.ok ? 'success' : 'error');
            if (r.ok) { deletedEntry = null; loadPage(currentPage); }
        }

        async function addEntry() {
            const pinyin = document.getElementById('add-pinyin').value.trim().toLowerCase();
            const word = document.getElementById('add-char').value.trim();
            if (!pinyin || !word) { showToast('拼音和词汇不能为空', 'error'); return; }

            const body = {
                pinyin, word, file: currentFile,
                en: document.getElementById('add-en').value.trim() || null,
                weight: parseInt(document.getElementById('add-weight').value) || null,
                stroke_aux: document.getElementById('add-stroke').value.trim() || null,
            };

            const r = await fetch('/api/dict/entry/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (r.ok) {
                showToast(`已添加至 ${getDictName(currentFile)}，请重新编译生效`, 'success');
                document.getElementById('add-pinyin').value = '';
                document.getElementById('add-char').value = '';
                document.getElementById('add-en').value = '';
                document.getElementById('add-stroke').value = '';
                await refreshDictList();
                loadPage(currentPage);
            } else if (r.status === 409) {
                showToast('该词条已存在', 'error');
            } else {
                showToast('添加失败', 'error');
            }
        }

        function showToastWithAction(msg, actionEl) {
            const el = document.getElementById('toast');
            el.innerHTML = '';
            el.appendChild(document.createTextNode(msg));
            el.appendChild(actionEl);
            el.className = 'toast success show';
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), 5000);
        }

        function sortBy(field) {
            if (currentSortBy === field) {
                currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortBy = field;
                currentSortOrder = 'asc';
            }
            document.querySelectorAll('.dict-table th').forEach(th => th.classList.remove('sorted'));
            const th = document.getElementById(`th-${field}`);
            if (th) {
                th.classList.add('sorted');
                const arrow = th.querySelector('.sort-arrow');
                if (arrow) arrow.textContent = currentSortOrder === 'asc' ? '▲' : '▼';
            }
            loadPage(1);
        }

        function renderPagination() {
            const el = document.getElementById('pagination');
            if (totalPages <= 1) { el.innerHTML = ''; return; }
            let html = '';
            html += `<button onclick="loadPage(1)" ${currentPage===1?'disabled':''}>«</button>`;
            html += `<button onclick="loadPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
            const start = Math.max(1, currentPage - 2);
            const end = Math.min(totalPages, currentPage + 2);
            if (start > 1) html += `<button onclick="loadPage(1)">1</button>${start>2?'...':''}`;
            for (let i = start; i <= end; i++)
                html += `<button class="${i===currentPage?'active':''}" onclick="loadPage(${i})">${i}</button>`;
            if (end < totalPages) html += `${end<totalPages-1?'...':''}<button onclick="loadPage(${totalPages})">${totalPages}</button>`;
            html += `<button onclick="loadPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
            html += `<button onclick="loadPage(${totalPages})" ${currentPage===totalPages?'disabled':''}>»</button>`;
            html += `<span class="page-info">${currentPage}/${totalPages}</span>`;
            el.innerHTML = html;
        }

        function updateStats() {
            document.getElementById('stats-bar').textContent = `${totalEntries.toLocaleString()} 条 · 每页 ${pageSize} 条`;
        }

        function refresh() { refreshDictList(); }

        async function compileDict() {
            showToast('编译开始...', 'success');
            const r = await fetch('/api/dicts/compile', { method: 'POST' });
            showToast(r.ok ? '编译完成' : '编译失败', r.ok ? 'success' : 'error');
        }

        async function openDictsDir() {
            const r = await fetch('/api/dicts/open', { method: 'POST' });
            showToast(r.ok ? '已打开词典目录' : '打开失败', r.ok ? 'success' : 'error');
        }

        function esc(s) { if (!s) return '-'; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function escAttr(s) { if (!s) return ''; return s.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type + ' show';
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), 2500);
        }

        init();
    </script>
</body>
</html>
