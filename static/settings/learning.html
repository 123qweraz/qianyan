<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>练习与学习 - 千言输入法</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .config-card { background: var(--apple-card); padding: 24px; border-radius: 20px; border: 1px solid var(--apple-border); margin-bottom: 24px; }
        .switch-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 12px; }
        .switch-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(0,0,0,0.02); border-radius: 10px; font-size: 13px; }
        .practice-card { background: white; border-radius: 32px; padding: 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.05); border: 1px solid var(--apple-border); margin-bottom: 24px; }
        .target-word { font-size: 100px; font-weight: 700; color: var(--apple-text); margin: 0; line-height: 1.2; }
        .hint-area { display: flex; justify-content: center; gap: 10px; margin: 20px 0 30px; flex-wrap: wrap; }
        .hint-badge { background: #f2f2f7; padding: 8px 16px; border-radius: 100px; font-size: 14px; color: var(--apple-secondary); font-weight: 500; }
        .hint-badge b { color: var(--apple-text); margin-left: 4px; font-family: 'SF Mono', monospace; }
        .practice-input { width: 100%; max-width: 500px; font-size: 28px; padding: 20px; border-radius: 16px; border: 2px solid #e1e1e6; text-align: center; outline: none; transition: all 0.3s; box-sizing: border-box; }
        .practice-input:focus { border-color: var(--apple-accent); box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }
        .stats-bar { display: flex; justify-content: space-around; margin-top: 30px; padding: 20px; background: #f8f8fa; border-radius: 20px; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; color: var(--apple-secondary); text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 26px; font-weight: 700; color: var(--apple-text); }
        .keyboard { display: flex; flex-direction: column; gap: 6px; background: #e5e5ea; padding: 16px; border-radius: 20px; user-select: none; margin-top: 6px; }
        .kb-row { display: flex; justify-content: center; gap: 6px; }
        .key { width: 68px; height: 68px; background: white; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 2px 0 #d1d1d6; transition: all 0.1s; cursor: default; }
        .key.active { transform: translateY(2px); box-shadow: 0 0 0 #d1d1d6; background: var(--apple-accent); color: white; }
        .key .char { font-size: 20px; font-weight: 700; }
        .key .strokes { font-size: 12px; color: #8e8e93; margin-top: 2px; }
        .key.active .strokes { color: rgba(255,255,255,0.8); }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); color: #34c759; } 100% { transform: scale(1); } }
        .success { animation: pop 0.4s ease-out; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; font-size: 20px; font-weight: 600; display: none; }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">正在加载词典...</div>

    <div class="container">
        <header>
            <a href="/" class="btn-back">← 返回控制中心</a>
            <h1>练习与学习</h1>
        </header>

        <div class="config-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 12px;">
                <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
                    <div>
                        <span style="font-size: 13px; color: var(--apple-secondary);">词库</span>
                        <select id="dictSelect" style="margin-left:6px; padding:6px 10px; border-radius:8px; font-size:13px;">
                            <option value="chinese/chars/level1.json">常用汉字</option>
                            <option value="chinese/words/high_freq.json">通用词组</option>
                            <option value="chinese/chars/level2.json">二级汉字</option>
                            <option value="chinese/chars/level3.json">三级汉字</option>
                        </select>
                    </div>
                </div>
                <button onclick="startPractice()" class="btn" style="font-size:13px; padding:8px 18px;">🔄 开始 / 重置</button>
            </div>

            <div class="switch-group">
                <div class="switch-item"><span>显示拼音</span><label class="switch"><input type="checkbox" id="showPinyinToggle" checked><span class="slider"></span></label></div>
                <div class="switch-item"><span>显示笔画码</span><label class="switch"><input type="checkbox" id="showStrokeToggle" checked><span class="slider"></span></label></div>
                <div class="switch-item"><span>显示英文辅助</span><label class="switch"><input type="checkbox" id="showEnglishToggle"><span class="slider"></span></label></div>
                <div class="switch-item"><span>自动播放中文发音</span><label class="switch"><input type="checkbox" id="autoZhToggle"><span class="slider"></span></label></div>
                <div class="switch-item"><span>自动播放英文发音</span><label class="switch"><input type="checkbox" id="autoEnToggle"><span class="slider"></span></label></div>
            </div>
        </div>

        <div class="practice-card" id="practiceArea" style="display:none;">
            <div style="display: flex; justify-content: center; align-items: center; gap: 12px;">
                <div class="target-word" id="targetWord">...</div>
                <button onclick="speakCurrent()" class="btn" style="padding:8px 12px; border-radius:50%; width:44px; height:44px; font-size:20px;">🔊</button>
            </div>

            <div class="hint-area">
                <div class="hint-badge" id="pinyinHintBadge">拼音: <b id="pinyinHint">-</b></div>
                <div class="hint-badge" id="strokeHintBadge">笔画码: <b id="strokeHint">-</b></div>
                <div class="hint-badge" id="englishHintBadge">英文: <b id="englishHint">-</b></div>
            </div>

            <input type="text" id="practiceInput" class="practice-input" placeholder="在此输入汉字..." autocomplete="off" spellcheck="false">

            <div class="stats-bar">
                <div class="stat-item"><div class="stat-label">已练习</div><div class="stat-value" id="countStat">0</div></div>
                <div class="stat-item"><div class="stat-label">准确率</div><div class="stat-value" id="accuracyStat">0%</div></div>
                <div class="stat-item"><div class="stat-label">词库</div><div id="dictNameStat" style="font-weight:600; margin-top:6px;">-</div></div>
                <div class="stat-item"><div class="stat-label">时长</div><div class="stat-value" id="timerStat">0s</div></div>
            </div>
        </div>

        <!-- 笔画键盘 -->
        <div class="keyboard" id="vKeyboard">
            <div class="kb-row" id="row1"></div>
            <div class="kb-row" id="row2"></div>
            <div class="kb-row" id="row3"></div>
        </div>

        <!-- 编码规则 -->
        <div class="config-card" id="rulesCard">
            <h3>笔画编码规则 (SBSRF 4码系统)</h3>
            <div style="font-size:13px; line-height:1.8; color:#444;">
                <p><b>5笔及以上 (4位)</b>：第1-2位=前4笔，第3位=末2笔，第4位=拼音首字母</p>
                <p><b>少于5笔</b>：1-2笔→1位笔画+首字母(2位)；3-4笔→2位笔画+首字母(3位)</p>
                <p style="margin-top:8px; padding:8px; background:#fff9e6; border-radius:8px; border:1px solid #ffe58f; color:#856404;">
                    <b>提示：</b>字母代表连续两笔画组合。例 <b>G</b>="横横"，<b>F</b>="横竖"，依此类推。
                </p>
            </div>
        </div>
    </div>

    <script src="/static/js/settings.js"></script>
    <script>
        let dict = {}, keys = [], stats = { count: 0, correct: 0, startTime: 0 };
        let currentWord = { char: '', pinyin: '', stroke: '', english: '' };
        let timerInterval = null;
        let audioPlayer = null;
        let learningConfig = { appearance: { show_pinyin_hint: true, show_learning_stroke_hint: true, show_learning_english_hint: true, auto_pronounce_zh: false, auto_pronounce_en: false } };

        // ===== Stroke keyboard =====
        const keyMap = { row1: "QWERTYUIOP", row2: "ASDFGHJKL", row3: "ZXCVBNM" };
        const strokeNames = { '1': '横', '2': '竖', '3': '撇', '4': '点', '5': '折' };
        const keyToStrokes = { G:'11',F:'12',D:'13',S:'14',A:'15', H:'21',J:'22',K:'23',L:'24',M:'25', T:'31',R:'32',E:'33',W:'34',Q:'35', Y:'41',U:'42',I:'43',O:'44',P:'45', N:'51',B:'52',V:'53',C:'54',X:'55' };

        function initKeyboard() {
            for (let rowId in keyMap) {
                const rowEl = document.getElementById(rowId);
                rowEl.innerHTML = '';
                keyMap[rowId].split('').forEach(c => {
                    const el = document.createElement('div'); el.className = 'key'; el.id = 'key-' + c.toLowerCase();
                    const ch = document.createElement('span'); ch.className = 'char'; ch.innerText = c;
                    const st = document.createElement('span'); st.className = 'strokes';
                    const code = keyToStrokes[c];
                    st.innerText = code ? strokeNames[code[0]] + strokeNames[code[1]] : '-';
                    el.appendChild(ch); el.appendChild(st);
                    rowEl.appendChild(el);
                });
            }
        }

        // ===== Init =====
        async function init() {
            try {
                const resp = await fetch('/api/config');
                if (resp.ok) { const c = await resp.json(); if (c.appearance) Object.assign(learningConfig.appearance, c.appearance); }
            } catch(_) {}
            const map = { showPinyinToggle:'show_pinyin_hint', showStrokeToggle:'show_learning_stroke_hint', showEnglishToggle:'show_learning_english_hint', autoZhToggle:'auto_pronounce_zh', autoEnToggle:'auto_pronounce_en' };
            for (let [id, key] of Object.entries(map)) {
                const el = document.getElementById(id); if (el) { el.checked = !!learningConfig.appearance[key]; el.onchange = () => { learningConfig.appearance[key] = el.checked; updateHints(); saveConfig(); }; }
            }
            updateHints();
            initKeyboard();
        }

        function updateHints() {
            document.getElementById('pinyinHintBadge').style.display = learningConfig.appearance.show_pinyin_hint ? '' : 'none';
            document.getElementById('strokeHintBadge').style.display = learningConfig.appearance.show_learning_stroke_hint ? '' : 'none';
            document.getElementById('englishHintBadge').style.display = learningConfig.appearance.show_learning_english_hint ? '' : 'none';
        }

        async function saveConfig() {
            try { await fetch('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(learningConfig) }); } catch(_) {}
        }

        // ===== Speech =====
        function speak(text, lang) {
            if (!text || text === '-' || text === '无') return;
            if (audioPlayer) { audioPlayer.pause(); audioPlayer = null; }
            const le = lang === 'zh' ? 'zh' : 'en';
            audioPlayer = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(text)}&le=${le}`);
            audioPlayer.play().catch(() => {});
        }
        function speakCurrent() {
            const t = document.getElementById('targetWord').innerText;
            if (t && t !== '...') speak(t, /[^\x00-\xff]/.test(t) ? 'zh' : 'en');
        }

        // ===== Practice =====
        function resetStats() {
            stats = { count: 0, correct: 0, startTime: Date.now() };
            updateStatsDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                document.getElementById('timerStat').innerText = Math.floor((Date.now() - stats.startTime) / 1000) + 's';
            }, 1000);
        }

        async function startPractice() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            resetStats();
            try {
                const path = document.getElementById('dictSelect').value;
                const resp = await fetch('/dicts/' + path);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                dict = await resp.json();
                keys = Object.keys(dict);
                if (keys.length === 0) throw new Error('词库为空');
                document.getElementById('practiceArea').style.display = 'block';
                document.getElementById('dictNameStat').innerText = document.getElementById('dictSelect').selectedOptions[0]?.text || '-';
                nextWord();
                document.getElementById('practiceInput').focus();
            } catch(e) { alert('加载失败: ' + e.message); }
            finally { document.getElementById('loadingOverlay').style.display = 'none'; }
        }

        function nextWord() {
            if (keys.length === 0) return;
            const key = keys[Math.floor(Math.random() * keys.length)];
            const data = dict[key];

            let target = key, stroke = '-', english = '-';
            if (Array.isArray(data) && data.length > 0) {
                const entry = data[Math.floor(Math.random() * data.length)];
                target = entry.char || key;
                stroke = entry.stroke_aux || '-';
                english = entry.en || '-';
            }
            currentWord = { char: target, pinyin: key, stroke, english };

            document.getElementById('targetWord').innerText = currentWord.char;
            document.getElementById('pinyinHint').innerText = currentWord.pinyin;
            document.getElementById('strokeHint').innerText = currentWord.stroke;
            document.getElementById('englishHint').innerText = currentWord.english;

            const input = document.getElementById('practiceInput');
            input.value = '';
            input.dataset.target = currentWord.char;
            input.style.borderColor = '#e1e1e6';
            input.focus();

            if (document.getElementById('autoZhToggle').checked && /[^\x00-\xff]/.test(currentWord.char)) speak(currentWord.char, 'zh');
            if (document.getElementById('autoEnToggle').checked && currentWord.english !== '-' && currentWord.english !== currentWord.char) {
                setTimeout(() => speak(currentWord.english, 'en'), 1000);
            }
        }

        document.getElementById('practiceInput').addEventListener('compositionstart', function() {
            e_target_composing = true;
        });
        document.getElementById('practiceInput').addEventListener('compositionend', function(e) {
            e_target_composing = false;
            handleInput(e);
        });
        document.getElementById('practiceInput').addEventListener('input', function(e) {
            if (e_target_composing) return;
            handleInput(e);
        });

        let e_target_composing = false;
        function handleInput(e) {
            const val = e.target.value.trim();
            const target = e.target.dataset.target;
            if (!val || !target) return;

            if (val === target) {
                stats.count++; stats.correct++;
                updateStatsDisplay();
                document.getElementById('targetWord').classList.add('success');
                e.target.style.borderColor = '#34c759';
                setTimeout(() => { document.getElementById('targetWord').classList.remove('success'); e.target.style.borderColor = '#e1e1e6'; nextWord(); }, 400);
            } else if (val.length >= target.length) {
                e.target.style.borderColor = '#ff3b30';
                stats.count++;
                updateStatsDisplay();
            }
        }

        function updateStatsDisplay() {
            document.getElementById('countStat').innerText = stats.count;
            const acc = stats.count === 0 ? 0 : Math.round((stats.correct / stats.count) * 100);
            document.getElementById('accuracyStat').innerText = acc + '%';
        }

        document.addEventListener('keydown', function(e) {
            const el = document.getElementById('key-' + e.key.toLowerCase());
            if (el) { el.classList.add('active'); setTimeout(() => el.classList.remove('active'), 100); }
            if (document.activeElement !== document.getElementById('practiceInput') && e.key !== 'Tab') {
                e.preventDefault();
            }
        });

        init();
    </script>
</body>
</html>
