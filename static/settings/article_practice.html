<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章练习 - 千言输入法</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .practice-layout {
            max-width: 900px;
            margin: 0 auto;
        }

        .config-card {
            background: var(--apple-card);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--apple-border);
            margin-bottom: 24px;
        }

        .config-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .config-row select {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid #8e8e93;
            font-size: 14px;
            font-weight: 600;
            background: white;
            outline: none;
        }

        .config-row select:focus {
            border-color: var(--apple-accent);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.15);
        }

        .import-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f2f2f7;
            border: 2px dashed var(--apple-border);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--apple-text);
            transition: all 0.2s;
        }

        .import-btn:hover {
            border-color: var(--apple-accent);
            background: rgba(0,113,227,0.05);
        }

        .switch-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .switch-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .switch-item .desc {
            font-size: 14px;
            color: var(--apple-text);
        }

        .practice-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid var(--apple-border);
        }

        .article-display {
            background: #fafafa;
            border-radius: 16px;
            padding: 24px;
            font-size: 18px;
            line-height: 2;
            letter-spacing: 1px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 32px;
            border: 1px solid #eee;
            font-family: "STSong", "SimSun", "Noto Serif CJK SC", serif;
        }

        .article-display .art-char {
            transition: color 0.15s, background 0.15s;
            border-radius: 3px;
            padding: 1px 0;
            cursor: pointer;
        }

        .article-display .art-char:hover {
            background: rgba(0,113,227,0.12) !important;
        }

        .article-display .art-done {
            color: #34c759;
        }

        .article-display .art-current {
            color: var(--apple-text);
            background: #cce4ff;
            border-radius: 4px;
            padding: 2px 1px;
            box-shadow: 0 0 0 2px #0071e3;
            font-weight: 700;
        }

        .article-display .art-pending {
            color: #c7c7cc;
        }

        .article-display .art-space {
            display: inline;
        }

        .current-char-area {
            text-align: center;
            margin-bottom: 24px;
        }

        .current-char {
            font-size: 100px;
            font-weight: 700;
            color: var(--apple-text);
            line-height: 1.2;
            display: inline-block;
            min-width: 120px;
        }

        .current-context {
            font-size: 16px;
            color: var(--apple-secondary);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .current-context .ctx-current {
            color: var(--apple-accent);
            font-weight: 700;
            font-size: 20px;
            border-bottom: 2px solid var(--apple-accent);
        }

        .practice-input {
            width: 100%;
            max-width: 500px;
            font-size: 32px;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #e1e1e6;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            display: block;
            margin: 0 auto 32px;
        }

        .practice-input:focus {
            border-color: var(--apple-accent);
            box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
        }

        .practice-input.input-error {
            border-color: #ff3b30;
            animation: shake 0.3s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .progress-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }

        .progress-bar-track {
            width: 100%;
            height: 8px;
            background: #e1e1e6;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #34c759, #30d158);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .stat-item {
            text-align: center;
            padding: 12px;
            background: #f5f5f7;
            border-radius: 12px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--apple-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--apple-text);
        }

        @keyframes success-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); color: #34c759; }
            100% { transform: scale(1); }
        }

        .success-anim {
            animation: success-pop 0.4s ease-out;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--apple-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff3b30;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 6px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
            background: rgba(255,59,48,0.1);
        }

        .article-name-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #34a853;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
        }

        .article-name-badge.builtin {
            background: #e3f2fd;
            color: #1976d2;
        }

        .position-selector {
            margin: 16px 0;
            padding: 16px;
            background: #f8f8fa;
            border-radius: 14px;
            border: 1px solid #eee;
        }

        .position-selector .pos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .position-selector .pos-header label {
            font-weight: 600;
            font-size: 14px;
        }

        .position-selector .pos-header .pos-info {
            font-size: 13px;
            color: var(--apple-secondary);
        }

        .position-selector input[type="range"] {
            width: 100%;
            margin: 6px 0;
            accent-color: var(--apple-accent);
        }

        .position-selector .pos-preview {
            font-size: 14px;
            color: var(--apple-secondary);
            padding: 8px 12px;
            background: white;
            border-radius: 8px;
            border: 1px solid #eee;
            margin-top: 6px;
            line-height: 1.6;
            min-height: 20px;
        }

        .position-selector .pos-preview b {
            color: var(--apple-accent);
            font-size: 18px;
        }

        .jump-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
            padding: 10px 16px;
            background: #f8f8fa;
            border-radius: 12px;
        }

        .jump-btn {
            background: white;
            border: 1px solid var(--apple-border);
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--apple-text);
            line-height: 1;
        }

        .jump-btn:hover {
            border-color: var(--apple-accent);
            background: rgba(0,113,227,0.06);
        }

        .jump-btn:active {
            transform: scale(0.95);
        }

        .jump-btn.icon-btn {
            padding: 8px 12px;
            font-size: 16px;
        }

        .jump-control .jump-info {
            font-size: 13px;
            color: var(--apple-secondary);
            font-weight: 600;
            min-width: 52px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="btn-back">← 返回控制中心</a>
            <h1>文章练习</h1>
        </header>

        <div class="practice-layout">
            <div class="config-card" id="configCard">
                <div class="config-row">
                    <select id="articleSelect" style="flex:2">
                        <option value="">选择文章...</option>
                    </select>
                    <label class="import-btn">
                        📂 导入TXT
                        <input type="file" id="fileInput" accept=".txt" style="display:none">
                    </label>
                </div>

                <div class="position-selector" id="positionSelector" style="display:none">
                    <div class="pos-header">
                        <label>起始位置</label>
                        <span class="pos-info" id="posInfo">第 1 字 / 0%</span>
                    </div>
                    <input type="range" id="posSlider" min="0" max="1000" value="0">
                    <div class="pos-preview" id="posPreview"></div>
                </div>

                <div class="switch-group">
                    <div class="switch-item">
                        <span class="desc">显示上下文提示</span>
                        <label class="switch"><input type="checkbox" id="showContextToggle" checked><span class="slider"></span></label>
                    </div>
                    <div class="switch-item">
                        <span class="desc">自动朗读</span>
                        <label class="switch"><input type="checkbox" id="autoSpeakToggle"><span class="slider"></span></label>
                    </div>
                </div>

                <button onclick="startPractice()" class="btn" style="width:100%">开始练习</button>
            </div>

            <div id="practiceArea" style="display:none">
                <div class="practice-card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                        <span id="articleNameBadge" class="article-name-badge">千字文</span>
                        <button onclick="stopPractice()" class="btn btn-danger" style="padding:8px 16px;font-size:13px">退出练习</button>
                    </div>

                    <div class="article-display" id="articleDisplay"></div>

                    <div class="current-char-area">
                        <div style="display:flex;justify-content:center;align-items:center;gap:20px">
                            <div class="current-char" id="currentChar">天</div>
                            <button onclick="speakCurrentChar()" class="btn" style="padding:10px 15px;border-radius:50%;width:50px;height:50px;font-size:24px;line-height:1">🔊</button>
                        </div>
                        <div class="current-context" id="currentContext"></div>
                    </div>

                    <input type="text" id="practiceInput" class="practice-input" placeholder="在此输入当前字符..." autocomplete="off">

                    <div class="jump-control">
                        <button class="jump-btn icon-btn" onclick="jumpStep(-50)" title="向前50字">⏪</button>
                        <button class="jump-btn icon-btn" onclick="jumpStep(-1)" title="向前1字">◀</button>
                        <span class="jump-info" id="jumpInfo">0%</span>
                        <button class="jump-btn icon-btn" onclick="jumpStep(1)" title="向后1字">▶</button>
                        <button class="jump-btn icon-btn" onclick="jumpStep(50)" title="向后50字">⏩</button>
                    </div>

                    <div class="progress-section">
                        <div class="progress-bar-track" id="progressTrack" style="cursor:pointer">
                            <div class="progress-bar-fill" id="progressFill"></div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-label">进度</div>
                                <div class="stat-value" id="progressStat">0/0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">正确率</div>
                                <div class="stat-value" id="accuracyStat">0%</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">速度</div>
                                <div class="stat-value" id="speedStat">0</div>
                                <div style="font-size:11px;color:var(--apple-secondary)">字/分钟</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">用时</div>
                                <div class="stat-value" id="timeStat">00:00</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BUILTIN_ARTICLES = [
            { name: '千字文', url: '/static/texts/qianziwen.txt', builtin: true }
        ];

        const STORAGE_KEY = 'article_practice_list';

        // ===== State =====
        let articles = [];
        let currentArticle = null;
        let targets = [];
        let currentIndex = 0;
        let stats = { total: 0, correct: 0, errors: 0 };
        let startTime = null;
        let timerInterval = null;
        let isPracticing = false;
        let isComposing = false;

        // ===== Article Management =====
        function loadArticles() {
            articles = [...BUILTIN_ARTICLES];
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed)) {
                        articles = articles.concat(parsed);
                    }
                }
            } catch (e) {
                console.warn('加载导入文章失败:', e);
            }
            populateSelect();
            // 预加载第一篇文章的内容用于位置预览
            if (articles.length > 0) {
                ensureArticleText(articles[0]);
            }
        }

        async function ensureArticleText(article) {
            if (article.text) return;
            if (!article.url) return;
            try {
                const r = await fetch(article.url);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                article.text = await r.text();
                // 刷新位置预览
                const select = document.getElementById('articleSelect');
                const idx = parseInt(select.value);
                if (!isNaN(idx) && idx >= 0 && idx < articles.length && articles[idx] === article) {
                    updatePositionSelector();
                }
            } catch (e) {
                console.warn('加载文章失败:', article.name, e);
                showToast('加载文章失败: ' + article.name);
            }
        }

        function saveImportedArticles() {
            const imported = articles.filter(a => !a.builtin);
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(imported));
            } catch (e) {
                console.warn('保存导入文章失败:', e);
            }
        }

        function populateSelect() {
            const select = document.getElementById('articleSelect');
            select.innerHTML = '<option value="">选择文章...</option>';
            articles.forEach((a, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = a.name + (a.builtin ? ' (内置)' : '');
                select.appendChild(opt);
            });
        }

        function addImportedArticle(name, text) {
            articles.push({ name, text, builtin: false });
            saveImportedArticles();
            populateSelect();
            const select = document.getElementById('articleSelect');
            select.value = articles.length - 1;
        }

        function deleteImportedArticle(index) {
            if (index < BUILTIN_ARTICLES.length) return;
            articles.splice(index, 1);
            saveImportedArticles();
            populateSelect();
        }

        // ===== File Import =====
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(ev) {
                const text = ev.target.result;
                let name = file.name;
                if (name.endsWith('.txt')) name = name.slice(0, -4);

                let exists = false;
                for (const a of articles) {
                    if (a.name === name && !a.builtin) {
                        a.text = text;
                        exists = true;
                        break;
                    }
                }
                if (!exists) {
                    addImportedArticle(name, text);
                } else {
                    saveImportedArticles();
                }
                showToast(`已导入: ${name}`);
            };
            reader.readAsText(file, 'UTF-8');
            e.target.value = '';
        });

        // ===== Practice Logic =====
        async function startPractice() {
            const select = document.getElementById('articleSelect');
            const idx = parseInt(select.value);
            if (isNaN(idx) || idx < 0 || idx >= articles.length) {
                showToast('请先选择一篇文章');
                return;
            }

            const article = articles[idx];
            currentArticle = article;

            if (!article.text) {
                showToast('正在加载文章...');
                await ensureArticleText(article);
                if (!article.text) {
                    showToast('文章加载失败');
                    return;
                }
            }

            const raw = article.text;
            targets = [];
            for (const ch of raw) {
                if (ch !== ' ' && ch !== '\n' && ch !== '\r' && ch !== '\t') {
                    targets.push(ch);
                }
            }

            if (targets.length === 0) {
                showToast('文章内容为空');
                return;
            }

            const startPos = parseInt(document.getElementById('posSlider').value) || 0;
            currentIndex = Math.min(startPos, targets.length - 1);
            stats = { total: targets.length, correct: 0, errors: 0 };
            startTime = Date.now();
            isPracticing = true;

            document.getElementById('configCard').style.display = 'none';
            document.getElementById('practiceArea').style.display = 'block';

            const badge = document.getElementById('articleNameBadge');
            badge.textContent = article.name;
            badge.className = 'article-name-badge' + (article.builtin ? ' builtin' : '');

            document.getElementById('jumpInfo').textContent = Math.round((currentIndex / targets.length) * 100) + '%';

            renderArticle();
            updateCurrentChar();
            updateStats();
            startTimer();

            if (document.getElementById('autoSpeakToggle').checked) {
                setTimeout(() => speakCurrentChar(), 300);
            }

            const input = document.getElementById('practiceInput');
            input.value = '';
            input.focus();
        }

        function stopPractice() {
            isPracticing = false;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById('configCard').style.display = 'block';
            document.getElementById('practiceArea').style.display = 'none';
            currentArticle = null;
        }

        function jumpToPosition(pos) {
            if (!isPracticing || targets.length === 0) return;
            if (isNaN(pos) || pos < 0 || pos >= targets.length) return;
            currentIndex = pos;
            document.getElementById('jumpInfo').textContent = Math.round((pos / targets.length) * 100) + '%';
            renderArticle();
            updateCurrentChar();
            updateStats();
            document.getElementById('practiceInput').value = '';
            document.getElementById('practiceInput').focus();
        }

        function jumpStep(step) {
            jumpToPosition(currentIndex + step);
        }

        function renderArticle() {
            const container = document.getElementById('articleDisplay');
            const text = currentArticle ? currentArticle.text : '';
            let html = '';
            let charIdx = 0;

            for (const ch of text) {
                if (ch === '\n') {
                    html += '<br>';
                    continue;
                }
                if (ch === ' ' || ch === '\r' || ch === '\t') {
                    html += '<span class="art-space"> </span>';
                    continue;
                }

                let cls = 'art-char';
                if (charIdx < currentIndex) {
                    cls += ' art-done';
                } else if (charIdx === currentIndex) {
                    cls += ' art-current';
                } else {
                    cls += ' art-pending';
                }
                html += `<span class="${cls}" data-idx="${charIdx}">${ch}</span>`;
                charIdx++;
            }

            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
            const currentEl = container.querySelector('.art-current');
            if (currentEl) {
                currentEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
        }

        function updateCurrentChar() {
            const charEl = document.getElementById('currentChar');
            const ctxEl = document.getElementById('currentContext');
            const showCtx = document.getElementById('showContextToggle').checked;

            if (currentIndex < targets.length) {
                charEl.textContent = targets[currentIndex];
            } else {
                charEl.textContent = '✓';
            }

            if (showCtx && currentIndex < targets.length) {
                const start = Math.max(0, currentIndex - 4);
                const end = Math.min(targets.length, currentIndex + 5);
                let ctx = '';
                for (let i = start; i < end; i++) {
                    if (i === currentIndex) {
                        ctx += `<span class="ctx-current">${targets[i]}</span>`;
                    } else {
                        ctx += targets[i];
                    }
                }
                ctxEl.innerHTML = ctx;
            } else {
                ctxEl.innerHTML = '';
            }
        }

        function handleCharInput(e) {
            if (!isPracticing || currentIndex >= targets.length) return;
            if (isComposing) return;

            const input = e.target;
            const val = input.value.trim();

            if (val.length === 0) return;

            if (val === targets[currentIndex]) {
                stats.correct++;
                currentIndex++;
                input.value = '';
                input.style.borderColor = '#34c759';

                const charEl = document.getElementById('currentChar');
                charEl.classList.add('success-anim');
                setTimeout(() => charEl.classList.remove('success-anim'), 400);

                renderArticle();
                updateCurrentChar();
                updateStats();

                if (document.getElementById('autoSpeakToggle').checked && currentIndex < targets.length) {
                    speakCurrentChar();
                }

                if (currentIndex >= targets.length) {
                    finishPractice();
                }
            } else {
                stats.errors++;
                input.value = '';
                input.classList.add('input-error');
                input.style.borderColor = '#ff3b30';
                setTimeout(() => {
                    input.classList.remove('input-error');
                    input.style.borderColor = '#e1e1e6';
                }, 400);
                updateStats();
            }
        }

        function finishPractice() {
            isPracticing = false;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = elapsed / 60;
            const wpm = minutes > 0 ? Math.round(stats.total / minutes) : stats.total;

            const charEl = document.getElementById('currentChar');
            charEl.textContent = '🎉';
            charEl.style.fontSize = '80px';

            const input = document.getElementById('practiceInput');
            input.style.display = 'none';

            const ctx = document.getElementById('currentContext');
            ctx.innerHTML = `<span style="font-size:24px;font-weight:700;color:#34c759">
                练习完成! 共 ${stats.total} 字，正确率 ${calcAccuracy()}%，速度 ${wpm} 字/分钟
            </span>`;

            setTimeout(() => {
                if (confirm('练习完成！要重新开始吗？')) {
                    resetPractice();
                } else {
                    stopPractice();
                }
            }, 1500);
        }

        function resetPractice() {
            const input = document.getElementById('practiceInput');
            input.style.display = 'block';
            input.value = '';

            const charEl = document.getElementById('currentChar');
            charEl.style.fontSize = '100px';

            currentIndex = 0;
            stats = { total: targets.length, correct: 0, errors: 0 };
            startTime = Date.now();
            isPracticing = true;

            renderArticle();
            updateCurrentChar();
            updateStats();
            startTimer();
            input.focus();
        }

        // ===== Text-to-Speech =====
        let audioPlayer = null;

        function speak(text) {
            if (!text) return;
            if (audioPlayer) {
                audioPlayer.pause();
                audioPlayer = null;
            }
            const url = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(text)}&le=zh`;
            audioPlayer = new Audio(url);
            audioPlayer.play().catch(e => console.warn('自动发音失败:', e));
        }

        function speakCurrentChar() {
            if (currentIndex < targets.length) {
                speak(targets[currentIndex]);
            }
        }

        // ===== Stats & Timer =====
        function updateStats() {
            const total = stats.total;
            const done = currentIndex;
            const acc = calcAccuracy();

            document.getElementById('progressStat').textContent = `${done}/${total}`;
            document.getElementById('accuracyStat').textContent = `${acc}%`;
            document.getElementById('progressFill').style.width = `${(done / total) * 100}%`;

            if (startTime && done > 0) {
                const elapsed = (Date.now() - startTime) / 1000 / 60;
                const wpm = elapsed > 0 ? Math.round(done / elapsed) : 0;
                document.getElementById('speedStat').textContent = wpm;
            }
        }

        function calcAccuracy() {
            const total = stats.correct + stats.errors;
            if (total === 0) return 100;
            return Math.round((stats.correct / total) * 100);
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (startTime) {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                    const s = String(elapsed % 60).padStart(2, '0');
                    document.getElementById('timeStat').textContent = `${m}:${s}`;

                    if (currentIndex > 0) {
                        const minutes = elapsed / 60;
                        const wpm = minutes > 0 ? Math.round(currentIndex / minutes) : currentIndex;
                        document.getElementById('speedStat').textContent = wpm;
                    }
                }
            }, 1000);
        }

        // ===== Event Binding =====
        const practiceInput = document.getElementById('practiceInput');

        practiceInput.addEventListener('compositionstart', () => { isComposing = true; });
        practiceInput.addEventListener('compositionend', () => {
            isComposing = false;
            handleCharInput({ target: practiceInput });
        });
        practiceInput.addEventListener('input', handleCharInput);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && isPracticing) {
                e.preventDefault();
                stopPractice();
            }
        });

        // ===== Toast =====
        function showToast(message) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.className = 'status-toast';
                document.body.appendChild(toast);
            }
            toast.innerText = message;
            toast.className = 'status-toast show';
            setTimeout(() => { toast.className = 'status-toast'; }, 2000);
        }

        // ===== Position Selection =====
        function getTargetsForArticle(articleIdx) {
            if (articleIdx < 0 || articleIdx >= articles.length) return [];
            const a = articles[articleIdx];
            if (!a.text) return null;
            const result = [];
            for (const ch of a.text) {
                if (ch !== ' ' && ch !== '\n' && ch !== '\r' && ch !== '\t') {
                    result.push(ch);
                }
            }
            return result;
        }

        function updatePositionSelector() {
            const select = document.getElementById('articleSelect');
            const idx = parseInt(select.value);
            const selector = document.getElementById('positionSelector');

            if (isNaN(idx) || idx < 0 || idx >= articles.length) {
                selector.style.display = 'none';
                return;
            }

            const t = getTargetsForArticle(idx);
            if (t === null) {
                selector.style.display = 'block';
                document.getElementById('posInfo').textContent = '加载中...';
                document.getElementById('posPreview').textContent = '正在加载文章内容...';
                return;
            }
            if (t.length === 0) {
                selector.style.display = 'none';
                return;
            }

            selector.style.display = 'block';
            const slider = document.getElementById('posSlider');
            slider.max = t.length - 1;
            updatePosPreview(t);
        }

        function updatePosPreview(targets) {
            const val = parseInt(document.getElementById('posSlider').value) || 0;
            const total = targets.length;
            const pct = total > 0 ? Math.round((val / total) * 100) : 0;
            document.getElementById('posInfo').textContent = `第 ${val + 1} 字 / ${pct}%`;

            const start = Math.max(0, val - 3);
            const end = Math.min(total, val + 4);
            let preview = '';
            for (let i = start; i < end; i++) {
                if (i === val) {
                    preview += `<b>${targets[i]}</b>`;
                } else {
                    preview += targets[i];
                }
            }
            document.getElementById('posPreview').innerHTML = preview;
        }

        document.getElementById('articleSelect').addEventListener('change', function() {
            const idx = parseInt(this.value);
            if (!isNaN(idx) && idx >= 0 && idx < articles.length) {
                ensureArticleText(articles[idx]);
            }
            updatePositionSelector();
        });

        document.getElementById('posSlider').addEventListener('input', function() {
            const idx = parseInt(document.getElementById('articleSelect').value);
            if (isNaN(idx)) return;
            const t = getTargetsForArticle(idx);
            if (t) updatePosPreview(t);
        });

        document.getElementById('articleDisplay').addEventListener('click', function(e) {
            const span = e.target.closest('.art-char');
            if (!span || !isPracticing) return;
            const idx = parseInt(span.dataset.idx);
            if (!isNaN(idx)) jumpToPosition(idx);
        });

        document.getElementById('progressTrack').addEventListener('click', function(e) {
            if (!isPracticing || targets.length === 0) return;
            const rect = this.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            const pos = Math.round(pct * (targets.length - 1));
            jumpToPosition(pos);
        });

        // ===== Init =====
        loadArticles();
    </script>
    <script src="/static/js/sidebar.js"></script>
</body>
</html>
