<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户词典 - 千言输入法</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .dict-table-wrap { overflow-x: auto; border: 1px solid var(--apple-border); border-radius: 10px; }
        .dict-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 400px; }
        .dict-table th { position: sticky; top: 0; background: var(--apple-bg); padding: 8px 6px; font-weight: 600; border-bottom: 2px solid var(--apple-border); user-select: none; white-space: nowrap; z-index: 1; font-size: 12px; }
        .dict-table td { padding: 6px 6px; border-bottom: 1px solid var(--apple-border); vertical-align: middle; }
        .dict-table tr:hover td { background: var(--apple-hover); }
        .cell-pinyin { font-family: monospace; font-size: 11px; }
        .cell-word { font-weight: 600; }
        .no-data { text-align: center; padding: 40px 20px; color: var(--apple-secondary); }
        .stats-bar { font-size: 12px; color: var(--apple-secondary); }
        .btn-delete { background: transparent; color: var(--apple-red); border: none; cursor: pointer; font-size: 14px; padding: 3px 8px; border-radius: 4px; }
        .btn-delete:hover { background: rgba(255,59,48,0.1); }
        .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 10px 14px; border: 1px solid var(--apple-border); border-radius: 10px; background: var(--apple-card-bg); margin-bottom: 12px; }
        .note { margin-bottom: 12px; padding: 12px 16px; font-size: 12px; line-height: 1.6; background: rgba(9,105,218,0.04); border-left: 3px solid var(--apple-accent); border-radius: 6px; }
        .note code { background: rgba(0,0,0,0.05); padding: 1px 5px; border-radius: 3px; font-size: 11px; }
        .actions { display: flex; gap: 8px; }
        .actions .btn { font-size: 13px; padding: 6px 14px; }
        .tab-bar { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--apple-border); }
        .tab-btn { padding: 10px 20px; border: none; background: transparent; font-size: 14px; font-weight: 500; color: var(--apple-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
        .tab-btn:hover { color: var(--apple-text); }
        .tab-btn.active { color: var(--apple-accent); border-bottom-color: var(--apple-accent); font-weight: 600; }
        .tab-badge { display: inline-block; background: var(--apple-border); color: var(--apple-secondary); font-size: 11px; padding: 1px 7px; border-radius: 8px; margin-left: 6px; }
        .tab-btn.active .tab-badge { background: rgba(0,113,227,0.12); color: var(--apple-accent); }
        .type-tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
        .type-learned { background: #e8f5e9; color: #2e7d32; }
        .type-usage { background: #e3f2fd; color: #1565c0; }
        .type-ngram { background: #fce4ec; color: #c62828; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="btn-back">← 返回控制中心</a>
            <h1>用户词典</h1>
        </header>

        <div class="note">
            <strong>💡 说明</strong><br>
            • <strong>用户词典</strong> — 自动造词记录的自定义词组<br>
            • <strong>使用频率</strong> — 选词频率统计，用于调频排序<br>
            • <strong>上下文联想</strong> — N-Gram 关联历史，记录前后词关系<br>
            使用下方标签页切换查看不同类型的数据。
        </div>

        <div class="card">
            <h3 style="margin-top:0;">⚙️ 学习控制</h3>
            <div class="setting-item">
                <div class="info"><div class="title">启用频率学习</div><div class="desc">记录选词习惯，根据使用频率调整候选词顺序</div></div>
                <div style="display:flex;align-items:center;">
                    <label class="switch"><input type="checkbox" id="enable_auto_reorder"><span class="slider"></span></label>
                </div>
            </div>
            <div class="setting-item">
                <div class="info"><div class="title">启用造词记录</div><div class="desc">将上屏的多字词自动加入用户词典</div></div>
                <div style="display:flex;align-items:center;">
                    <label class="switch"><input type="checkbox" id="enable_word_discovery"><span class="slider"></span></label>
                </div>
            </div>
            <div class="setting-item">
                <div class="info"><div class="title">常用词自动置顶</div><div class="desc">使用3次以上的候选词自动跳到第一位</div></div>
                <div style="display:flex;align-items:center;">
                    <label class="switch"><input type="checkbox" id="enable_fixed_first_candidate"><span class="slider"></span></label>
                </div>
            </div>
            <div style="padding-top:12px;">
                <button class="btn" onclick="saveSwitches()" style="font-size:13px; padding:8px 18px;">保存开关设置</button>
            </div>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('learned')">📖 用户词典<span class="tab-badge" id="count-learned">0</span></button>
            <button class="tab-btn" onclick="switchTab('usage')">📊 使用频率<span class="tab-badge" id="count-usage">0</span></button>
            <button class="tab-btn" onclick="switchTab('ngram')">🔗 上下文联想<span class="tab-badge" id="count-ngram">0</span></button>
        </div>

        <div class="toolbar">
            <span style="font-weight:600;">浏览</span>
            <select id="profile-filter" onchange="renderTable()" style="margin-left:10px;">
                <option value="all">全部方案</option>
            </select>
            <select id="data-type-filter" onchange="renderTable()" style="margin-left:10px;display:none;">
            </select>
            <span class="stats-bar" id="stats-bar"></span>
            <div class="actions" style="margin-left:auto;">
                <button class="btn" onclick="exportAll()">📥 导出全部数据</button>
                <button class="btn" onclick="clearCurrentProfile()" style="color:var(--apple-red);">🗑 清空当前方案</button>
                <button class="btn btn-danger" onclick="clearAll()">🗑 清空全部</button>
                <button class="btn" onclick="cleanupSystemWords()">🧹 清除系统已有词</button>
            </div>
        </div>

        <div class="dict-table-wrap">
            <table class="dict-table" id="user-dict-table">
                <thead>
                    <tr>
                        <th class="left">类型</th>
                        <th class="left">方案</th>
                        <th class="left">键/拼音</th>
                        <th class="left">词汇</th>
                        <th class="center">权重</th>
                        <th class="center">操作</th>
                    </tr>
                </thead>
                <tbody id="user-dict-body"></tbody>
            </table>
        </div>
    </div>

    <div id="toast" class="status-toast"></div>

    <script src="/static/js/settings.js"></script>
    <script>
        let allEntries = [];
        let currentTab = 'learned';
        let filterProfile = 'all';

        async function init() {
            await loadConfig();
            // bind switch toggles
            bindInput('enable_auto_reorder', 'input');
            bindInput('enable_word_discovery', 'input');
            bindInput('enable_fixed_first_candidate', 'input');
            await loadAll();
        }

        async function saveSwitches() {
            await saveConfig();
            showToast('开关设置已保存', 'success');
        }

        async function loadAll() {
            const r = await fetch('/api/dict/user/browse');
            if (!r.ok) {
                document.getElementById('user-dict-body').innerHTML =
                    '<tr><td colspan="6" class="no-data">无法加载用户词典</td></tr>';
                return;
            }
            allEntries = await r.json();
            const profiles = [...new Set(allEntries.map(e => e.profile))].sort();
            const sel = document.getElementById('profile-filter');
            sel.innerHTML = '<option value="all">全部方案</option>' +
                profiles.map(p => `<option value="${p}">${p}</option>`).join('');
            if (filterProfile !== 'all' && !profiles.includes(filterProfile)) filterProfile = 'all';
            sel.value = filterProfile;

            // Update tab counts
            for (const t of ['learned', 'usage', 'ngram']) {
                const count = allEntries.filter(e => e.data_type === t).length;
                const el = document.getElementById('count-' + t);
                if (el) el.textContent = count;
            }
            renderTable();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                if (b.textContent.includes(tab === 'learned' ? '用户词典' : tab === 'usage' ? '使用频率' : '上下文联想')) {
                    b.classList.add('active');
                }
            });
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('user-dict-body');
            filterProfile = document.getElementById('profile-filter').value;

            let entries = allEntries.filter(e => e.data_type === currentTab);
            if (filterProfile !== 'all') {
                entries = entries.filter(e => e.profile === filterProfile);
            }

            const total = allEntries.filter(e => e.data_type === currentTab).length;
            document.getElementById('stats-bar').textContent =
                `显示 ${entries.length} / ${total} 条`;

            if (entries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="no-data">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = entries.map((e) => {
                const tagClass = e.data_type === 'learned' ? 'type-learned' :
                    e.data_type === 'usage' ? 'type-usage' : 'type-ngram';
                const tagLabel = e.data_type === 'learned' ? '词典' :
                    e.data_type === 'usage' ? '频率' : 'ngram';
                return `<tr>
                    <td><span class="type-tag ${tagClass}">${tagLabel}</span></td>
                    <td class="left">${esc(e.profile)}</td>
                    <td class="left cell-pinyin">${esc(e.pinyin)}</td>
                    <td class="left cell-word">${esc(e.word)}</td>
                    <td class="center">${e.weight}</td>
                    <td class="center">
                        <button class="btn-delete" onclick="deleteEntry('${esc_attr(e.profile)}', '${esc_attr(e.pinyin)}', '${esc_attr(e.word)}')" title="删除">✕</button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function deleteEntry(profile, pinyin, word) {
            if (!confirm(`确定要删除 "${word}" (${pinyin}) 吗？`)) return;
            const r = await fetch('/api/dict/user/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ profile, pinyin, word })
            });
            showToast(r.ok ? `已删除 "${word}"` : '删除失败', r.ok ? 'success' : 'error');
            if (r.ok) loadAll();
        }

        async function clearCurrentProfile() {
            if (filterProfile === 'all') {
                showToast('请先选择要清空的方案', 'error');
                return;
            }
            if (!confirm(`确定要清空 "${filterProfile}" 方案的所有用户数据（词典+频率+联想）吗？此操作无法撤销。`)) return;
            const res = await fetch('/api/dict/clear_user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ profile: filterProfile, all: false })
            });
            showToast(res.ok ? `"${filterProfile}" 数据已清空` : '清空失败', res.ok ? 'success' : 'error');
            if (res.ok) loadAll();
        }

        async function clearAll() {
            if (!confirm('确定要清空所有方案的全部用户数据吗？此操作无法撤销。')) return;
            const res = await fetch('/api/dict/clear_user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ profile: null, all: true })
            });
            showToast(res.ok ? '所有用户数据已清空' : '清空失败', res.ok ? 'success' : 'error');
            if (res.ok) loadAll();
        }

        async function cleanupSystemWords() {
            if (!confirm('将扫描用户词典，移除系统词典中已存在的词（如\"大家\"、\"我们\"等）。\n\n此操作不会删除系统词典中没有的自造词。')) return;
            const res = await fetch('/api/dict/user/cleanup', { method: 'POST' });
            if (!res.ok) { showToast('清理失败', 'error'); return; }
            const results = await res.json();
            const total = results.reduce((s, r) => s + r.removed, 0);
            showToast(`清理完成！共移除 ${total} 个系统已有词`, 'success');
            loadAll();
        }

        async function exportAll() {
            try {
                const resp = await fetch('/api/user/export');
                if (!resp.ok) { showToast('导出失败', 'error'); return; }
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'qianyan_user_data_backup.json';
                a.click();
                URL.revokeObjectURL(url);
                showToast('全部数据导出完成（含词典+频率+联想）', 'success');
            } catch(e) {
                showToast('导出失败: ' + e.message, 'error');
            }
        }

        function esc(s) { if (!s) return '-'; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function esc_attr(s) { if (!s) return ''; return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            if (type === 'success') { el.style.background = '#34c759'; el.style.color = '#fff'; }
            else if (type === 'error') { el.style.background = 'var(--apple-red)'; el.style.color = '#fff'; }
            el.style.display = 'block';
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.style.display = 'none', 2500);
        }

        init();
    </script>
</body>
</html>
