            const cfg = symbolData[currentCategory];
            title.textContent = currentCategory;
            controls.style.display = cfg.type === 'keyboard' ? 'block' : 'none';
            updateShiftLabel();

            if (cfg.type === 'grid') {
                display.className = 'symbol-grid';
                if (cfg.data.length === 0) {
                    empty.style.display = 'block';
                    empty.textContent = currentCategory === 'жңҖиҝ‘' ? 'зӮ№еҮ»з¬ҰеҸ·еҗҺжӯӨеӨ„дјҡеҮәзҺ°жңҖиҝ‘дҪҝз”Ё' : 'ж”¶и—ҸеӨ№дёәз©әпјҢзӮ№еҮ»вҳ…еҸҜж”¶и—Ҹ';
                    return;
                }
                cfg.data.forEach(s => { if (s) display.appendChild(createSymbolItem(s)); });
            } else if (cfg.type === 'keyboard') {
                display.className = 'keyboard-layout';
                cfg.rows.forEach(row => {
                    const rd = document.createElement('div'); rd.className = 'kb-row';
                    row.forEach(key => {
                        if (key.startsWith('Shift')) {
                            const btn = document.createElement('div');
                            btn.className = 'symbol-item kb-key kb-key-wide' + (isShifted ? ' active-shift' : '');
                            btn.textContent = key;
                            btn.onclick = toggleShift;
                            rd.appendChild(btn);
                        } else {
                            const sym = transformChar(key);
                            const item = createSymbolItem(sym);
                            item.classList.add('kb-key');
                            rd.appendChild(item);
                        }
                    });
                    display.appendChild(rd);
                });
            }
        }

        function createSymbolItem(sym) {
            const item = document.createElement('div');
            item.className = 'symbol-item' + (favoriteSymbols.includes(sym) ? ' is-fav' : '');
            item.textContent = sym;
            item.title = sym;

            const star = document.createElement('span');
            star.className = 'fav-toggle'; star.textContent = 'вҳ…';
            star.onclick = (e) => { e.stopPropagation(); toggleFav(sym); };
            item.appendChild(star);

            item.onclick = () => handleSymbolClick(sym);
            return item;
        }

        function transformChar(char) {
            const cfg = symbolData[currentCategory];
            if (!cfg.map) return char;
            const idx = cfg.map.lower.indexOf(char);
            if (idx === -1) return char;
            return isShifted ? cfg.map.upper[idx] : cfg.map.lower[idx];
        }

        function toggleShift() { isShifted = !isShifted; renderContent(); }

        function updateShiftLabel() {
            const st = document.getElementById('shift-status');
            if (currentCategory === 'ж—Ҙж–Ү') st.textContent = isShifted ? 'зүҮеҒҮеҗҚ' : 'е№іеҒҮеҗҚ';
            else st.textContent = isShifted ? 'еӨ§еҶҷ' : 'е°ҸеҶҷ';
        }

        function handleSymbolClick(sym) {
            const bulkText = document.getElementById('bulkText');
            const bulkArea = document.getElementById('bulkArea');
            bulkText.textContent += sym;
            bulkArea.classList.add('show');
            navigator.clipboard.writeText(sym).catch(err => console.error('Clip copy fail:', err));

            recentSymbols = [sym, ...recentSymbols.filter(s => s !== sym)].slice(0, 50);
            localStorage.setItem('symbols_recent', JSON.stringify(recentSymbols));
            symbolData["жңҖиҝ‘"].data = recentSymbols;
            if (currentCategory === "жңҖиҝ‘") renderContent();
        }

        function toggleFav(sym) {
            if (favoriteSymbols.includes(sym)) {
                favoriteSymbols = favoriteSymbols.filter(s => s !== sym);
            } else {
                favoriteSymbols.unshift(sym);
            }
            localStorage.setItem('symbols_favs', JSON.stringify(favoriteSymbols));
            symbolData["ж”¶и—Ҹ"].data = favoriteSymbols;
            renderContent();
        }

        function setupSearch() {
            document.getElementById('symbol-search').addEventListener('input', () => {
                const q = document.getElementById('symbol-search').value.trim().toLowerCase();
                if (!q) { renderContent(); return; }

                let results = [];
                for (const [tag, syms] of Object.entries(searchTags)) {
                    if (tag.includes(q)) results.push(...syms.split(' '));
                }
                for (const [cat, cfg] of Object.entries(symbolData)) {
                    if (cat === 'жңҖиҝ‘' || cat === 'ж”¶и—Ҹ') continue;
                    const items = cfg.type === 'grid' ? cfg.data : cfg.map ? [...cfg.map.lower, ...cfg.map.upper] : [];
                    items.forEach(s => {
                        if (s && s.toLowerCase().includes(q) && !results.includes(s)) results.push(s);
                    });
                }
                renderContent([...new Set(results)]);
            });
        }

        function copyBulk() {
            const t = document.getElementById('bulkText').textContent;
            if (t) navigator.clipboard.writeText(t).then(() => showToast('е·ІеӨҚеҲ¶е…ЁйғЁ!'));
        }
        function clearBulk() {
            document.getElementById('bulkText').textContent = '';
            document.getElementById('bulkArea').classList.remove('show');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast show';
            setTimeout(() => t.className = 'toast', 1800);
        }

        init();
    </script>
</body>
</html>
