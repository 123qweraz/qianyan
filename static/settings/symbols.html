                if (e.key === 'Backspace') {

                    const isInput = activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA';
                    if (!isInput) {
                        e.preventDefault();

                    isShifted = false;
                    document.getElementById('symbol-search').value = '';

                    renderContent();

                container.appendChild(tab);

                }
                config.data.forEach(sym => display.appendChild(createSymbolItem(sym)));
            } else if (config.type === 'keyboard') {
                display.className = 'keyboard-layout';
                config.rows.forEach(row => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'kb-row';
                    row.forEach(key => {
                        if (key.startsWith('Shift')) {
                            const btn = document.createElement('div');
                            btn.className = `symbol-item kb-key kb-key-wide ${isShifted ? 'active-shift' : ''}`;
                            btn.textContent = key;
                            btn.onclick = toggleShift;
                            rowDiv.appendChild(btn);
                        } else {
                            const sym = transformChar(key);
                            const item = createSymbolItem(sym);
                            item.classList.add('kb-key');
                            rowDiv.appendChild(item);
                        }
                    });
                    display.appendChild(rowDiv);
                });
            }
        }

        function createSymbolItem(sym) {
            const item = document.createElement('div');
            item.className = 'symbol-item';
            if (favoriteSymbols.includes(sym)) item.classList.add('is-fav');
            item.textContent = sym;
            
            const star = document.createElement('span');
            star.className = 'fav-star';
            star.textContent = 'вҳ…';
            star.onclick = (e) => {
                e.stopPropagation();
                toggleFavorite(sym);
            };
            
            item.appendChild(star);
            item.onclick = () => handleSymbolClick(sym);
            return item;
        }

        function transformChar(char) {
            const config = symbolData[currentCategory];
            if (!config.map) return char;
            
            // For Japanese and others, the keys in rows are the actual lowercase chars
            const idx = config.map.lower.indexOf(char);
            if (idx === -1) return char;
            return isShifted ? (config.map.upper[idx] || char) : config.map.lower[idx];
        }

        function toggleShift() {
            isShifted = !isShifted;
            renderContent();
        }

        function updateShiftStatus() {
            const status = document.getElementById('shift-status');
            const isJapanese = currentCategory === 'ж—ҘиҜӯ';
            if (isJapanese) {
                status.textContent = isShifted ? 'еҪ“еүҚпјҡзүҮеҒҮеҗҚ (Katakana)' : 'еҪ“еүҚпјҡе№іеҒҮеҗҚ (Hiragana)';
            } else {
                status.textContent = isShifted ? 'еӨ§еҶҷжЁЎејҸ (Shift ON)' : 'е°ҸеҶҷжЁЎејҸ (Shift OFF)';
            }
        }

        function handleSymbolClick(sym) {
            const bulkInput = document.getElementById('bulk-input');
            bulkInput.value += sym;
            copyToClipboard(sym);
            addToRecent(sym);
        }

        function addToRecent(sym) {
            recentSymbols = [sym, ...recentSymbols.filter(s => s !== sym)].slice(0, 50);
            localStorage.setItem('recent_symbols', JSON.stringify(recentSymbols));
            symbolData["жңҖиҝ‘"].data = recentSymbols;
            if (currentCategory === "жңҖиҝ‘") renderContent();
        }

        function toggleFavorite(sym) {
            if (favoriteSymbols.includes(sym)) {
                favoriteSymbols = favoriteSymbols.filter(s => s !== sym);
            } else {
                favoriteSymbols.unshift(sym);
            }
            localStorage.setItem('favorite_symbols', JSON.stringify(favoriteSymbols));
            symbolData["ж”¶и—Ҹ"].data = favoriteSymbols;
            renderTabs();
            renderContent();
        }

        function setupSearch() {
            const searchInput = document.getElementById('symbol-search');
            searchInput.oninput = () => {
                const query = searchInput.value.trim().toLowerCase();
                if (!query) {
                    renderContent();
                    return;
                }

                let results = [];
                Object.keys(searchTags).forEach(tag => {
                    if (tag.includes(query)) results.push(...searchTags[tag].split(' '));
                });

                Object.values(symbolData).forEach(cat => {
                    const data = cat.type === 'grid' ? cat.data : [...cat.map.lower, ...cat.map.upper];
                    data.forEach(sym => {
                        if (sym.includes(query) && !results.includes(sym)) results.push(sym);
                    });
                });

                renderContent(results);
            };
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`е·ІеӨҚеҲ¶: ${text}`);
            });
        }

        function copyBulk() {
            const bulkInput = document.getElementById('bulk-input');
            if (bulkInput.value) copyToClipboard(bulkInput.value);
        }

        function clearBulk() {
            document.getElementById('bulk-input').value = '';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1500);
        }

        init();
    </script>
</body>
</html>
