<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>长韵母快速输入 - 千言输入法</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .kb-key { height: 76px; min-width: 64px; cursor: pointer; }
        .kb-key-sub { font-size: 12px; color: var(--apple-secondary); margin-top: 2px; line-height: 1.2; }
        .kb-key.active .kb-key-main { color: var(--apple-accent); }
        .kb-key.active { border-color: var(--apple-accent); background: rgba(9,105,218,0.06); }
        .kb-key.selected { border-color: var(--apple-accent); box-shadow: 0 0 0 2px rgba(9,105,218,0.25); }
        .mapping-editor {
            display: none;
            margin-top: 20px;
            padding: 24px;
            background: var(--apple-card);
            border-radius: 20px;
            border: 1px solid var(--apple-border);
        }
        .note {
            padding: 16px 20px;
            background: rgba(9, 105, 218, 0.08);
            border-radius: 12px;
            border-left: 4px solid var(--apple-accent);
            margin: 20px 0;
            font-size: 14px;
            line-height: 1.6;
            color: var(--apple-text);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="btn-back">← 返回控制中心</a>
            <h1>长韵母快速输入</h1>
        </header>

        <div class="note">
            <strong>使用说明：</strong>按住 <kbd>CapsLock</kbd> 的同时按下字母键即可快速输入对应的长韵母。<br>
            例如：设置 <kbd>Y</kbd> → <code>uan</code>，则输入 "g" 后按 <kbd>CapsLock + Y</kbd> 得到 "guan"。<br>
            按住 <kbd>CapsLock</kbd> 时按 <kbd>Backspace</kbd> 可删除整个音节。
        </div>

        <div class="card">
            <div class="setting-item">
                <div class="info"><div class="title">启用长韵母快速输入</div><div class="desc">开启后，按住 CapsLock 再按字母键即可输入配置的长韵母</div></div>
                <label class="switch"><input type="checkbox" id="enable_quick_finals"><span class="slider"></span></label>
            </div>
        </div>

        <h2>韵母映射</h2>
        <p class="desc" style="margin-bottom: 20px;">点击下方按键配置对应的韵母。高亮的按键表示已绑定，带有 👍 标记的为推荐右手键位。</p>

        <div class="keyboard" id="kb-quickfinals"></div>

        <div id="editor" class="mapping-editor">
            <h3 id="edit-title">编辑按键: -</h3>
            <div class="setting-item" style="flex-direction: column; align-items: flex-start;">
                <div class="info"><div class="title">韵母输出</div><div class="desc">按下 CapsLock + 此键时插入的韵母拼音（留空则不绑定）</div></div>
                <input type="text" id="input-final" placeholder="例如: iang" style="width: 100%; margin-top: 8px; font-size: 18px; font-family: monospace;">
            </div>
        </div>
    </div>

    <div class="sticky-footer">
        <button class="btn" onclick="resetDefaults()">恢复默认</button>
        <button class="btn btn-danger" onclick="resetAll()">重置长韵母默认</button>
        <button class="btn" onclick="save()">保存更改</button>
    </div>

    <div id="toast" class="status-toast"></div>

    <script src="/static/js/settings.js"></script>
    <script>
        const KB_LAYOUT = [
            ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
            ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
            ['z', 'x', 'c', 'v', 'b', 'n', 'm']
        ];
        const RIGHT_HAND = ['y', 'u', 'i', 'o', 'p', 'h', 'j', 'k', 'l', 'n', 'm'];
        const DEFAULT_FINALS = {
            u: 'uang', i: 'ing', o: 'ong', p: 'iong',
            h: 'ang', j: 'eng', k: 'uai', l: 'iang',
            n: 'iao', m: 'ian', y: 'uan'
        };
        let currentKey = '';

        function getFinalsMap() {
            const map = {};
            (config.quick_finals || []).forEach(qf => {
                if (qf.key && qf.final_text) map[qf.key.toLowerCase()] = qf.final_text;
            });
            return map;
        }

        function setFinal(key, finalText) {
            const finals = config.quick_finals || [];
            const idx = finals.findIndex(qf => qf.key.toLowerCase() === key.toLowerCase());
            if (finalText) {
                if (idx >= 0) finals[idx].final_text = finalText;
                else finals.push({ key: key.toLowerCase(), final_text: finalText });
            } else {
                if (idx >= 0) finals.splice(idx, 1);
            }
            config.quick_finals = finals;
        }

        function renderKeyboard() {
            const container = document.getElementById('kb-quickfinals');
            const map = getFinalsMap();
            container.innerHTML = KB_LAYOUT.map(row => `
                <div class="keyboard-row">
                    ${row.map(k => {
                        const final = map[k] || "";
                        const isRight = RIGHT_HAND.includes(k);
                        const sub = final ? `${final}${isRight ? ' 👍' : ''}` : '';
                        return `<div class="kb-key ${final ? 'active' : ''} ${currentKey === k ? 'selected' : ''}" onclick="editKey('${k}')">
                            <div class="kb-key-main">${k.toUpperCase()}</div>
                            <div class="kb-key-sub">${sub}</div>
                        </div>`;
                    }).join('')}
                </div>
            `).join('');
        }

        function editKey(key) {
            currentKey = key;
            const map = getFinalsMap();
            document.getElementById('editor').style.display = 'block';
            document.getElementById('edit-title').innerText = '编辑按键: ' + key.toUpperCase();
            const input = document.getElementById('input-final');
            input.value = map[key] || '';
            input.oninput = () => {
                const v = input.value.trim();
                setFinal(key, v);
                renderKeyboard();
            };
            renderKeyboard();
            document.getElementById('editor').scrollIntoView({ behavior: 'smooth' });
        }

        function resetDefaults() {
            if (!confirm('确定要恢复长韵母设置为默认值吗？')) return;
            const finals = [];
            for (const [key, final_text] of Object.entries(DEFAULT_FINALS)) {
                finals.push({ key, final_text });
            }
            config.quick_finals = finals;
            renderKeyboard();
            showToast('已载入默认设置，请点击保存');
        }

        async function resetAll() {
            if (!confirm('确定重置拼音相关设置到默认值吗？此操作不可撤销。')) return;
            await fetch('/api/config/reset/input,hotkeys,quickfinals', { method: 'POST' });
            location.reload();
        }

        async function initForm() {
            bindInput('enable_quick_finals', null);
            renderKeyboard();
        }

        async function init() {
            await loadConfig();
            await initForm();
        }

        async function save() {
            await saveConfig();
        }

        init();
    </script>
    <script src="/static/js/sidebar.js"></script>
</body>
</html>
