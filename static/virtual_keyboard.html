<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟键盘 - rust-ime</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: #f5f5f7;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            color: var(--apple-text);
        }
        .layout-select {
            display: flex;
            gap: 10px;
        }
        .layout-btn {
            padding: 10px 20px;
            border: none;
            background: var(--apple-card);
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--apple-secondary);
            transition: all 0.2s;
        }
        .layout-btn.active {
            background: var(--apple-accent);
            color: white;
        }
        .input-area {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--apple-border);
        }
        .input-area textarea {
            width: 100%;
            min-height: 80px;
            border: none;
            font-size: 24px;
            resize: none;
            outline: none;
            background: transparent;
        }
        .input-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--apple-accent);
            color: white;
        }
        .btn-secondary {
            background: #e5e5ea;
            color: var(--apple-text);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .keyboard {
            background: #e5e5ea;
            padding: 24px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            user-select: none;
        }
        .kb-row {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .key {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #d1d1d6;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
        }
        .key:active, .key.pressed {
            transform: translateY(4px);
            box-shadow: 0 0 0 #d1d1d6;
            background: var(--apple-accent);
            color: white;
        }
        .key .char {
            font-size: 24px;
            font-weight: 700;
        }
        .key .sub {
            font-size: 12px;
            color: #8e8e93;
            position: absolute;
            top: 4px;
            right: 6px;
        }
        .key:active .sub, .key.pressed .sub {
            color: rgba(255,255,255,0.7);
        }
        .key.wide {
            width: 100px;
        }
        .key.wider {
            width: 130px;
        }
        .key.space {
            width: 300px;
        }
        .key .hint {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
        }
        .key:active .hint, .key.pressed .hint {
            color: rgba(255,255,255,0.7);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--apple-card);
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .status-info {
            display: flex;
            gap: 20px;
        }
        .status-item {
            font-size: 14px;
            color: var(--apple-secondary);
        }
        .status-item b {
            color: var(--apple-accent);
        }
        .help-text {
            font-size: 12px;
            color: var(--apple-secondary);
        }
        .notice {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #856404;
        }
        .notice strong {
            color: #d39e00;
        }
        .candidates {
            background: var(--apple-card);
            border: 1px solid var(--apple-border);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: none;
        }
        .candidates.show {
            display: block;
        }
        .candidates .pinyin {
            color: var(--apple-secondary);
            font-size: 14px;
            margin-bottom: 10px;
        }
        .candidates .pinyin span {
            background: #f2f2f7;
            padding: 4px 12px;
            border-radius: 8px;
        }
        .candidates .words {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .candidates .word {
            background: #f2f2f7;
            color: var(--apple-text);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }
        .candidates .word:hover {
            background: var(--apple-accent);
            color: white;
        }
        .candidates .word .num {
            color: var(--apple-secondary);
            font-size: 12px;
            margin-right: 6px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #34c759;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⌨️ 虚拟键盘</h1>
            <div class="layout-select">
                <button class="layout-btn active" data-layout="chinese">中文</button>
                <button class="layout-btn" data-layout="english">英文</button>
                <button class="layout-btn" data-layout="japanese">日文</button>
                <button class="layout-btn" data-layout="stroke">笔画</button>
            </div>
        </div>

        <div class="notice">
            <strong>💡 提示：</strong>输入拼音后按 <strong>空格键</strong> 选词，按 <strong>数字键 1-9</strong> 直接选择候选词。候选框显示在下方。
        </div>

        <div class="input-area">
            <textarea id="input-text" placeholder="点击按键输入文字... 输入拼音后按空格选词"></textarea>
            <div class="input-actions">
                <button class="btn btn-primary" id="btn-copy">📋 复制到剪贴板</button>
                <button class="btn btn-secondary" id="btn-clear">🗑️ 清空</button>
            </div>
        </div>

        <div class="candidates" id="candidates">
            <div class="pinyin" id="cand-pinyin"><span></span></div>
            <div class="words" id="cand-words"></div>
        </div>

        <div class="status-bar">
            <div class="status-info">
                <div class="status-item">当前布局: <b id="current-layout">中文</b></div>
                <div class="status-item">字符数: <b id="char-count">0</b></div>
            </div>
            <div class="help-text">
                左键单击: 输入 | 右键: Shift | 双击: 双击映射 | 长按: 长按映射
            </div>
        </div>

        <div class="keyboard" id="keyboard"></div>
    </div>

        let currentLayout = 'chinese';
        let longPressTimer = null;
        let isShift = false;
        let isCapsLock = false;
        let currentPinyin = '';

        const inputText = document.getElementById('input-text');

        function renderKeyboard() {
            const container = document.getElementById('keyboard');
            container.innerHTML = '';

            const rows = KEYBOARD_DATA[currentLayout] || KEYBOARD_DATA.chinese;
            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'kb-row';
                
                row.forEach(key => {
                    const keyDiv = document.createElement('div');
                    keyDiv.className = `key ${key.className || ''}`;
                    keyDiv.dataset.key = key.id;
                    
                    keyDiv.innerHTML = `
                        <span class="sub">${key.sub || ''}</span>
                        <span class="char">${key.label}</span>
                        ${key.hint ? `<span class="hint">${key.hint}</span>` : ''}
                    `;

                    // Click handler - simple tap
                    keyDiv.addEventListener('click', () => handleKey(key.id, key.label));

                    // Right click - Shift
                    keyDiv.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleKey('Shift', 'Shift');
                    });

                    // Double click - double_tap mapping
                    keyDiv.addEventListener('dblclick', () => {
                        handleKey(key.id, key.label);
                    });

                    // Long press - long_press mapping
                    keyDiv.addEventListener('mousedown', () => {
                        longPressTimer = setTimeout(() => {
                            handleKey(key.id, key.label);
                        }, 500);
                    });

                    keyDiv.addEventListener('mouseup', () => {
                        if (longPressTimer) {
                            clearTimeout(longPressTimer);
                            longPressTimer = null;
                        }
                    });

                    keyDiv.addEventListener('mouseleave', () => {
                        if (longPressTimer) {
                            clearTimeout(longPressTimer);
                            longPressTimer = null;
                        }
                    });

                    rowDiv.appendChild(keyDiv);
                });
                container.appendChild(rowDiv);
            });
        }

        function handleKey(keyId, keyLabel) {
            if (keyId === 'Space') {
                // 空格键：在中文模式下查询候选词或输入空格
                if (currentLayout === 'chinese' && currentPinyin.length > 0) {
                    selectCandidate(0); // 选择第一个候选词
                } else {
                    insertText(' ');
                }
            } else if (keyId === 'Backspace') {
                deleteChar();
            } else if (keyId === 'Enter') {
                if (currentLayout === 'chinese' && currentPinyin.length > 0) {
                    // 直接提交原始拼音
                    commitPinyin();
                } else {
                    insertText('\n');
                }
            } else if (keyId === 'Tab') {
                insertText('\t');
            } else if (keyId === 'Shift') {
                isShift = !isShift;
                renderKeyboard();
            } else if (keyId === 'CapsLock') {
                isCapsLock = !isCapsLock;
                renderKeyboard();
            } else if (keyId >= '1' && keyId <= '9') {
                // 数字键选择候选词
                const idx = parseInt(keyId) - 1;
                selectCandidate(idx);
            } else if (keyId === '0') {
                // 0 选择第10个
                selectCandidate(9);
            } else if (keyId === 'Ctrl' || keyId === 'Win' || keyId === 'Alt' || keyId === 'Menu') {
                // 忽略修饰键
            } else {
                let char = keyLabel;
                if (!isShift && char.length === 1 && char >= 'A' && char <= 'Z') {
                    char = char.toLowerCase();
                } else if (isShift && char.length === 1) {
                    char = char.toUpperCase();
                    isShift = false;
                    renderKeyboard();
                }
                
                if (currentLayout === 'chinese') {
                    // 中文模式：积累拼音
                    currentPinyin += char;
                    insertText(char);
                    queryCandidates();
                } else {
                    insertText(char);
                }
            }
        }

        // 查询候选词
        async function queryCandidates() {
            if (!currentPinyin) {
                hideCandidates();
                return;
            }
            
            try {
                const resp = await fetch('/api/dict/search?q=' + encodeURIComponent(currentPinyin));
                const results = await resp.json();
                showCandidates(results);
            } catch (e) {
                console.error('查询候选词失败:', e);
            }
        }

        // 显示候选词
        function showCandidates(results) {
            const container = document.getElementById('candidates');
            const pinyinEl = document.getElementById('cand-pinyin');
            const wordsEl = document.getElementById('cand-words');
            
            if (!results || results.length === 0) {
                container.classList.remove('show');
                return;
            }
            
            // 按拼音分组显示
            const pinyinMap = {};
            results.forEach(r => {
                if (!pinyinMap[r.pinyin]) {
                    pinyinMap[r.pinyin] = [];
                }
                pinyinMap[r.pinyin].push(r);
            });
            
            pinyinEl.innerHTML = '<span>' + currentPinyin + '</span>';
            wordsEl.innerHTML = '';
            
            let idx = 0;
            outer: for (const pinyin in pinyinMap) {
                for (const item of pinyinMap[pinyin]) {
                    if (idx >= 9) break outer;
                    const wordEl = document.createElement('div');
                    wordEl.className = 'word';
                    wordEl.dataset.index = idx;
                    wordEl.dataset.word = item.word;
                    wordEl.dataset.pinyin = item.pinyin;
                    wordEl.innerHTML = '<span class="num">' + (idx + 1) + '</span>' + item.word;
                    
                    // 直接添加点击事件
                    wordEl.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        const word = this.dataset.word;
                        const pinyinLen = currentPinyin.length;
                        const start = inputText.selectionStart;
                        
                        // 删除已输入的拼音
                        const before = inputText.value.substring(0, start - pinyinLen);
                        const after = inputText.value.substring(start);
                        inputText.value = before + word + after;
                        inputText.selectionStart = inputText.selectionEnd = start - pinyinLen + word.length;
                        
                        currentPinyin = '';
                        hideCandidates();
                        inputText.focus();
                        updateCharCount();
                    });
                    
                    wordsEl.appendChild(wordEl);
                    idx++;
                }
            }
            
            container.classList.add('show');
        }

        function hideCandidates() {
            document.getElementById('candidates').classList.remove('show');
        }

        // 选择候选词
        function selectCandidate(idx) {
            const words = document.querySelectorAll('#cand-words .word');
            if (!words[idx]) return;
            
            const word = words[idx].dataset.word;
            
            // 删除已输入的拼音
            const pinyinLen = currentPinyin.length;
            const start = inputText.selectionStart;
            inputText.value = inputText.value.substring(0, start - pinyinLen) + word + inputText.value.substring(start);
            inputText.selectionStart = inputText.selectionEnd = start - pinyinLen + word.length;
            
            currentPinyin = '';
            hideCandidates();
            inputText.focus();
            updateCharCount();
        }

        // 提交原始拼音（未找到匹配时）
        function commitPinyin() {
            currentPinyin = '';
            hideCandidates();
        }

        function insertText(text) {
            const start = inputText.selectionStart;
            const end = inputText.selectionEnd;
            const before = inputText.value.substring(0, start);
            const after = inputText.value.substring(end);
            inputText.value = before + text + after;
            inputText.selectionStart = inputText.selectionEnd = start + text.length;
            inputText.focus();
            updateCharCount();
        }

        function deleteChar() {
            const start = inputText.selectionStart;
            const end = inputText.selectionEnd;
            
            if (currentLayout === 'chinese' && currentPinyin.length > 0 && start > 0) {
                // 删除拼音的最后一个字符
                currentPinyin = currentPinyin.slice(0, -1);
            }
            
            if (start === end) {
                // 删除光标前的字符
                inputText.value = inputText.value.substring(0, start - 1) + inputText.value.substring(start);
                inputText.selectionStart = inputText.selectionEnd = start - 1;
            } else {
                // 删除选中文本
                inputText.value = inputText.value.substring(0, start) + inputText.value.substring(end);
                inputText.selectionStart = inputText.selectionEnd = start;
            }
            inputText.focus();
            updateCharCount();
            
            // 更新候选词
            if (currentLayout === 'chinese') {
                queryCandidates();
            }
        }

        function updateCharCount() {
            document.getElementById('char-count').textContent = inputText.value.length;
        }

        // 复制到剪贴板
        document.getElementById('btn-copy').addEventListener('click', async () => {
            const text = inputText.value;
            if (!text) {
                showToast('没有内容可复制');
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                showToast('已复制到剪贴板!');
            } catch (e) {
                showToast('复制失败: ' + e.message);
            }
        });

        // 清空
        document.getElementById('btn-clear').addEventListener('click', () => {
            inputText.value = '';
            updateCharCount();
            inputText.focus();
            showToast('已清空');
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Layout switch
        document.querySelectorAll('.layout-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLayout = btn.dataset.layout;
                document.getElementById('current-layout').textContent = btn.textContent;
                renderKeyboard();
            });
        });

        // Initial render
        renderKeyboard();
    </script>
</body>
</html>
