<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟键盘 - rust-ime</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: #f5f5f7;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            color: var(--apple-text);
        }
        .ime-select {
            display: flex;
            gap: 8px;
            background: var(--apple-card);
            padding: 6px;
            border-radius: 14px;
        }
        .ime-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--apple-secondary);
            transition: all 0.2s;
        }
        .ime-btn.active {
            background: var(--apple-accent);
            color: white;
        }
        .input-area {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--apple-border);
        }
        .input-area textarea {
            width: 100%;
            min-height: 60px;
            border: none;
            font-size: 24px;
            resize: none;
            outline: none;
            background: transparent;
        }
        .input-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--apple-accent);
            color: white;
        }
        .btn-secondary {
            background: #e5e5ea;
            color: var(--apple-text);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .keyboard {
            background: #e5e5ea;
            padding: 16px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            user-select: none;
        }
        .kb-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        .key {
            min-width: 48px;
            height: 52px;
            background: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 0 #d1d1d6;
            cursor: pointer;
            transition: all 0.08s;
            position: relative;
            padding: 0 8px;
        }
        .key:active, .key.pressed {
            transform: translateY(3px);
            box-shadow: 0 0 0 #d1d1d6;
            background: var(--apple-accent);
            color: white;
        }
        .key.shift-on {
            background: var(--apple-accent);
            color: white;
        }
        .key.caps-on {
            background: #007aff;
            color: white;
        }
        .key .char {
            font-size: 18px;
            font-weight: 600;
        }
        .key .sub {
            font-size: 10px;
            color: #8e8e93;
            position: absolute;
            top: 3px;
            right: 5px;
        }
        .key:active .sub, .key.pressed .sub, .key.shift-on .sub, .key.caps-on .sub {
            color: rgba(255,255,255,0.7);
        }
        .key.wide { min-width: 80px; }
        .key.wider { min-width: 100px; }
        .key.space { min-width: 280px; }
        
        .candidates {
            background: var(--apple-card);
            border: 1px solid var(--apple-border);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 16px;
            display: none;
        }
        .candidates.show { display: block; }
        .candidates .pinyin {
            color: var(--apple-secondary);
            font-size: 14px;
            margin-bottom: 10px;
        }
        .candidates .pinyin span {
            background: #f2f2f7;
            padding: 4px 12px;
            border-radius: 8px;
        }
        .candidates .words {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .candidates .word {
            background: #f2f2f7;
            color: var(--apple-text);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }
        .candidates .word:hover {
            background: var(--apple-accent);
            color: white;
        }
        .candidates .word .num {
            color: var(--apple-secondary);
            font-size: 12px;
            margin-right: 6px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--apple-card);
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--apple-secondary);
        }
        .status-bar b { color: var(--apple-accent); }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #34c759;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .help-tip {
            font-size: 12px;
            color: var(--apple-secondary);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⌨️ 虚拟键盘</h1>
            <div class="ime-select">
                <button class="ime-btn active" data-ime="chinese">中文</button>
                <button class="ime-btn" data-ime="english">英文</button>
                <button class="ime-btn" data-ime="japanese">日文</button>
                <button class="ime-btn" data-ime="stroke">笔画</button>
            </div>
        </div>

        <div class="status-bar">
            <span>当前: <b id="current-ime">中文</b></span>
            <span>字符: <b id="char-count">0</b></span>
        </div>

        <div class="input-area">
            <textarea id="input-text" placeholder="点击按键输入..."></textarea>
            <div class="input-actions">
                <button class="btn btn-primary" id="btn-copy">📋 复制</button>
                <button class="btn btn-secondary" id="btn-clear">🗑️ 清空</button>
            </div>
        </div>

        <div class="candidates" id="candidates">
            <div class="pinyin" id="cand-pinyin"><span></span></div>
            <div class="words" id="cand-words"></div>
        </div>

        <div class="keyboard" id="keyboard"></div>
        
        <div class="help-tip">空格选词 | 数字1-9直接选 | Backspace删除</div>
    </div>

    <div class="toast" id="toast">已复制!</div>

    <script>
        const KEYBOARD = [
            [
                { id: '`', label: '`', sub: '~' },
                { id: '1', label: '1', sub: '!' },
                { id: '2', label: '2', sub: '@' },
                { id: '3', label: '3', sub: '#' },
                { id: '4', label: '4', sub: '$' },
                { id: '5', label: '5', sub: '%' },
                { id: '6', label: '6', sub: '^' },
                { id: '7', label: '7', sub: '&' },
                { id: '8', label: '8', sub: '*' },
                { id: '9', label: '9', sub: '(' },
                { id: '0', label: '0', sub: ')' },
                { id: '-', label: '-', sub: '_' },
                { id: '=', label: '=', sub: '+' },
                { id: 'Backspace', label: '⌫', className: 'wide' }
            ],
            [
                { id: 'Tab', label: 'Tab', className: 'wide' },
                { id: 'q', label: 'q', sub: '÷' },
                { id: 'w', label: 'w', sub: '×' },
                { id: 'e', label: 'e' },
                { id: 'r', label: 'r' },
                { id: 't', label: 't' },
                { id: 'y', label: 'y' },
                { id: 'u', label: 'u' },
                { id: 'i', label: 'i' },
                { id: 'o', label: 'o' },
                { id: 'p', label: 'p' },
                { id: '[', label: '[', sub: '{' },
                { id: ']', label: ']', sub: '}' },
                { id: '\\', label: '\\', sub: '|' }
            ],
            [
                { id: 'CapsLock', label: 'Caps', className: 'wider' },
                { id: 'a', label: 'a' },
                { id: 's', label: 's' },
                { id: 'd', label: 'd' },
                { id: 'f', label: 'f' },
                { id: 'g', label: 'g' },
                { id: 'h', label: 'h' },
                { id: 'j', label: 'j' },
                { id: 'k', label: 'k' },
                { id: 'l', label: 'l' },
                { id: ';', label: ';', sub: ':' },
                { id: "'", label: "'", sub: '"' },
                { id: 'Enter', label: 'Enter', className: 'wider' }
            ],
            [
                { id: 'Shift', label: 'Shift', className: 'wider' },
                { id: 'z', label: 'z' },
                { id: 'x', label: 'x' },
                { id: 'c', label: 'c' },
                { id: 'v', label: 'v' },
                { id: 'b', label: 'b' },
                { id: 'n', label: 'n' },
                { id: 'm', label: 'm' },
                { id: ',', label: ',', sub: '<' },
                { id: '.', label: '.', sub: '>' },
                { id: '/', label: '/', sub: '?' },
                { id: 'Shift', label: 'Shift', className: 'wider' }
            ],
            [
                { id: 'Ctrl', label: 'Ctrl' },
                { id: 'Win', label: 'Win' },
                { id: 'Alt', label: 'Alt' },
                { id: 'Space', label: '空格', className: 'space' },
                { id: 'Alt', label: 'Alt' },
                { id: 'Win', label: 'Win' },
                { id: 'Menu', label: 'Menu' },
                { id: 'Ctrl', label: 'Ctrl' }
            ]
        ];

        let currentIme = 'chinese';
        let isShift = false;
        let isCapsLock = false;
        let currentPinyin = '';
        let currentPage = 0;
        let allCandidates = []; // 存储所有候选词

        const inputText = document.getElementById('input-text');

        function renderKeyboard() {
            const container = document.getElementById('keyboard');
            container.innerHTML = '';

            KEYBOARD.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'kb-row';
                
                row.forEach(key => {
                    const keyDiv = document.createElement('div');
                    keyDiv.className = `key ${key.className || ''}`;
                    keyDiv.dataset.key = key.id;
                    
                    // Shift 状态高亮
                    if (key.id === 'Shift' && isShift) {
                        keyDiv.classList.add('shift-on');
                    }
                    // CapsLock 状态高亮
                    if (key.id === 'CapsLock' && isCapsLock) {
                        keyDiv.classList.add('caps-on');
                    }
                    
                    keyDiv.innerHTML = `
                        <span class="sub">${key.sub || ''}</span>
                        <span class="char">${key.label}</span>
                    `;

                    keyDiv.addEventListener('click', () => handleKey(key.id, key.label));

                    rowDiv.appendChild(keyDiv);
                });
                container.appendChild(rowDiv);
            });
        }

        function handleKey(keyId, keyLabel) {
            // 数字键：没有拼音buffer时直接输出数字
            if (keyId >= '0' && keyId <= '9') {
                if (currentIme === 'chinese' && currentPinyin.length > 0 && isCandidatesVisible()) {
                    selectCandidate(keyId === '0' ? 9 : parseInt(keyId) - 1);
                } else {
                    // 直接输出数字
                    insertText(keyId);
                }
                return;
            }
            
            // - = 用于翻页（有拼音buffer时）
            if ((keyId === '-' || keyId === '=') && currentIme === 'chinese' && currentPinyin.length > 0) {
                if (keyId === '-') pageUp();
                else pageDown();
                return;
            }

            if (keyId === 'Space') {
                if (currentIme === 'chinese' && currentPinyin.length > 0) {
                    selectCandidate(0);
                } else {
                    insertText(' ');
                }
            } else if (keyId === 'Backspace') {
                deleteChar();
            } else if (keyId === 'Enter') {
                if (currentIme === 'chinese' && currentPinyin.length > 0) {
                    commitPinyin();
                } else {
                    insertText('\n');
                }
            } else if (keyId === 'Tab') {
                insertText('\t');
            } else if (keyId === 'Shift') {
                isShift = true;
                renderKeyboard();
            } else if (keyId === 'CapsLock') {
                isCapsLock = !isCapsLock;
                renderKeyboard();
            } else if (['Ctrl', 'Win', 'Alt', 'Menu'].includes(keyId)) {
                // 忽略
            } else {
                let char = keyLabel;
                
                // 大小写处理
                if ((isCapsLock || isShift) && char.length === 1 && char >= 'a' && char <= 'z') {
                    char = char.toUpperCase();
                } else if (!isShift && char.length === 1 && char >= 'A' && char <= 'Z') {
                    char = char.toLowerCase();
                }
                
                // Shift 用完就复位
                if (isShift && char.length === 1) {
                    isShift = false;
                }
                
                if (currentIme === 'chinese') {
                    currentPinyin += char.toLowerCase();
                    currentPage = 0; // 切新拼音时重置页码
                    insertText(char);
                    queryCandidates();
                    renderKeyboard();
                } else if (currentIme === 'japanese') {
                    currentPinyin += char.toLowerCase();
                    insertText(char);
                    queryJapaneseCandidates();
                } else if (currentIme === 'stroke') {
                    currentPinyin += char.toLowerCase();
                    insertText(char);
                    queryStrokeCandidates();
                } else {
                    insertText(char);
                    renderKeyboard();
                }
            }
        }

        function insertText(text) {
            const start = inputText.selectionStart;
            const end = inputText.selectionEnd;
            inputText.value = inputText.value.substring(0, start) + text + inputText.value.substring(end);
            inputText.selectionStart = inputText.selectionEnd = start + text.length;
            inputText.focus();
            updateCharCount();
        }

        function deleteChar() {
            const start = inputText.selectionStart;
            const end = inputText.selectionEnd;
            
            if (currentIme === 'chinese' && currentPinyin.length > 0 && start > 0) {
                currentPinyin = currentPinyin.slice(0, -1);
            }
            
            if (start === end && start > 0) {
                inputText.value = inputText.value.substring(0, start - 1) + inputText.value.substring(start);
                inputText.selectionStart = inputText.selectionEnd = start - 1;
            } else if (start !== end) {
                inputText.value = inputText.value.substring(0, start) + inputText.value.substring(end);
                inputText.selectionStart = inputText.selectionEnd = start;
            }
            inputText.focus();
            updateCharCount();
            
            if (currentIme === 'chinese') {
                queryCandidates();
            }
        }

        function updateCharCount() {
            document.getElementById('char-count').textContent = inputText.value.length;
        }

        async function queryCandidates() {
            if (!currentPinyin) {
                hideCandidates();
                return;
            }
            
            try {
                const resp = await fetch('/api/dict/search?q=' + encodeURIComponent(currentPinyin) + '&ime=chinese');
                const results = await resp.json();
                allCandidates = results;
                currentPage = 0;
                showCandidates(results);
            } catch (e) {
                console.error('查询失败:', e);
            }
        }

        async function queryJapaneseCandidates() {
            if (!currentPinyin) {
                hideCandidates();
                return;
            }
            
            try {
                const resp = await fetch('/api/dict/search?q=' + encodeURIComponent(currentPinyin) + '&ime=japanese');
                const results = await resp.json();
                allCandidates = results;
                currentPage = 0;
                showJapaneseCandidates(results);
            } catch (e) {
                console.error('查询失败:', e);
            }
        }

        async function queryStrokeCandidates() {
            if (!currentPinyin) {
                hideCandidates();
                return;
            }
            
            try {
                const resp = await fetch('/api/dict/search?q=' + encodeURIComponent(currentPinyin) + '&ime=stroke');
                const results = await resp.json();
                allCandidates = results;
                currentPage = 0;
                showStrokeCandidates(results);
            } catch (e) {
                console.error('查询失败:', e);
            }
        }

        function isCandidatesVisible() {
            return document.getElementById('candidates').classList.contains('show');
        }

        function pageUp() {
            if (currentPage > 0) {
                currentPage--;
                showCandidates(allCandidates);
            }
        }

        function pageDown() {
            const maxPage = Math.ceil(allCandidates.length / 9) - 1;
            if (currentPage < maxPage) {
                currentPage++;
                showCandidates(allCandidates);
            }
        }

        function showCandidates(results) {
            const container = document.getElementById('candidates');
            const pinyinEl = document.getElementById('cand-pinyin');
            const wordsEl = document.getElementById('cand-words');
            
            if (!results || results.length === 0) {
                container.classList.remove('show');
                return;
            }
            
            const pinyinMap = {};
            results.forEach(r => {
                if (!pinyinMap[r.pinyin]) pinyinMap[r.pinyin] = [];
                pinyinMap[r.pinyin].push(r);
            });
            
            pinyinEl.innerHTML = '<span>' + currentPinyin + '</span>';
            wordsEl.innerHTML = '';
            
            let idx = 0;
            outer: for (const py in pinyinMap) {
                for (const item of pinyinMap[py]) {
                    if (idx >= 9) break outer;
                    const wordEl = document.createElement('div');
                    wordEl.className = 'word';
                    wordEl.dataset.word = item.word;
                    wordEl.dataset.pinyin = item.pinyin;
                    wordEl.innerHTML = '<span class="num">' + (idx + 1) + '</span>' + item.word;
                    
                    wordEl.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        doSelectCandidate(this.dataset.word);
                    });
                    
                    wordsEl.appendChild(wordEl);
                    idx++;
                }
            }
            
            container.classList.add('show');
        }

        function showJapaneseCandidates(results) {
            const container = document.getElementById('candidates');
            const pinyinEl = document.getElementById('cand-pinyin');
            const wordsEl = document.getElementById('cand-words');
            
            if (!results || results.length === 0) {
                container.classList.remove('show');
                return;
            }
            
            pinyinEl.innerHTML = '<span>' + currentPinyin + '</span>';
            wordsEl.innerHTML = '';
            
            results.slice(0, 9).forEach((item, idx) => {
                const wordEl = document.createElement('div');
                wordEl.className = 'word';
                wordEl.dataset.word = item.word;
                wordEl.innerHTML = '<span class="num">' + (idx + 1) + '</span>' + item.word;
                
                wordEl.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    doSelectCandidate(this.dataset.word);
                });
                
                wordsEl.appendChild(wordEl);
            });
            
            container.classList.add('show');
        }

        function showStrokeCandidates(results) {
            const container = document.getElementById('candidates');
            const pinyinEl = document.getElementById('cand-pinyin');
            const wordsEl = document.getElementById('cand-words');
            
            if (!results || results.length === 0) {
                container.classList.remove('show');
                return;
            }
            
            pinyinEl.innerHTML = '<span>' + currentPinyin + '</span>';
            wordsEl.innerHTML = '';
            
            results.slice(0, 9).forEach((item, idx) => {
                const wordEl = document.createElement('div');
                wordEl.className = 'word';
                wordEl.dataset.word = item.word;
                wordEl.innerHTML = '<span class="num">' + (idx + 1) + '</span>' + item.word;
                
                wordEl.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    doSelectCandidate(this.dataset.word);
                });
                
                wordsEl.appendChild(wordEl);
            });
            
            container.classList.add('show');
        }

        function hideCandidates() {
            document.getElementById('candidates').classList.remove('show');
        }

        function selectCandidate(idx) {
            const words = document.querySelectorAll('#cand-words .word');
            if (words[idx]) {
                doSelectCandidate(words[idx].dataset.word);
            }
        }

        function doSelectCandidate(word) {
            const pinyinLen = currentPinyin.length;
            const start = inputText.selectionStart;
            
            const before = inputText.value.substring(0, start - pinyinLen);
            const after = inputText.value.substring(start);
            inputText.value = before + word + after;
            inputText.selectionStart = inputText.selectionEnd = start - pinyinLen + word.length;
            
            currentPinyin = '';
            hideCandidates();
            inputText.focus();
            updateCharCount();
        }

        function commitPinyin() {
            currentPinyin = '';
            hideCandidates();
        }

        // 复制
        document.getElementById('btn-copy').addEventListener('click', async () => {
            const text = inputText.value;
            if (!text) { showToast('没有内容'); return; }
            try {
                await navigator.clipboard.writeText(text);
                showToast('已复制!');
            } catch (e) { showToast('复制失败'); }
        });

        // 清空
        document.getElementById('btn-clear').addEventListener('click', () => {
            inputText.value = '';
            currentPinyin = '';
            updateCharCount();
            hideCandidates();
            inputText.focus();
            showToast('已清空');
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 切换输入法
        document.querySelectorAll('.ime-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.ime-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentIme = btn.dataset.ime;
                document.getElementById('current-ime').textContent = btn.textContent;
                
                // 切换时清空拼音
                currentPinyin = '';
                hideCandidates();
                renderKeyboard();
            });
        });

        renderKeyboard();
    </script>
</body>
</html>
