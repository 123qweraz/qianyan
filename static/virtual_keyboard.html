<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页输入法 - 千言输入法</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { background: #f5f5f7; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 24px; color: var(--apple-text); }
        .ime-select { display: flex; gap: 8px; background: var(--apple-card); padding: 6px; border-radius: 14px; }
        .ime-btn { padding: 10px 20px; border: none; background: transparent; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--apple-secondary); transition: all 0.2s; }
        .ime-btn.active { background: var(--apple-accent); color: white; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--apple-card); border-radius: 12px; margin-bottom: 16px; font-size: 13px; color: var(--apple-secondary); }
        .status-bar b { color: var(--apple-accent); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; background: #ccc; }
        .status-dot.ok { background: #34c759; }
        .status-dot.filter { background: #ff9500; }

        /* Editor on top */
        .editor-row { margin-bottom: 14px; }
        .editor-row textarea {
            width: 100%; min-height: 120px; padding: 14px 18px;
            font-size: 20px; border: 2px solid var(--apple-border);
            border-radius: 14px; outline: none; background: white;
            color: var(--apple-text); resize: vertical;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.8;
        }
        .editor-row textarea:focus { border-color: var(--apple-accent); }
        .editor-actions { display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--apple-accent); color: white; }
        .btn-secondary { background: #e5e5ea; color: var(--apple-text); }

        /* Candidates row */
        .cand-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
            background: var(--apple-card); border: 1px solid var(--apple-border);
            border-radius: 12px; padding: 8px 12px; min-height: 52px;
        }
        .cand-row .page-btn {
            width: 32px; height: 32px; border-radius: 8px; border: none;
            background: #e5e5ea; cursor: pointer; font-size: 16px;
            font-weight: 600; color: var(--apple-secondary);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .cand-row .page-btn:active { background: var(--apple-accent); color: white; }
        .cand-row .page-btn:disabled { opacity: 0.3; cursor: default; }
        .cand-row .cand-items { display: flex; gap: 6px; flex: 1; justify-content: center; }
        .cand-row .cand-item {
            background: #f2f2f7; color: var(--apple-text);
            padding: 8px 14px; border-radius: 8px; cursor: pointer;
            font-size: 18px; transition: all 0.15s;
            display: flex; flex-direction: column; align-items: center;
            min-width: 48px; text-align: center;
        }
        .cand-row .cand-item:hover { background: var(--apple-accent); color: white; }
        .cand-row .cand-item:active { transform: scale(0.96); }
        .cand-row .cand-item .num { color: var(--apple-secondary); font-size: 11px; }
        .cand-row .cand-item .hint { color: #999; font-size: 10px; margin-top: 1px; }
        .cand-row .cand-item.exact { border: 2px solid #34c759; }
        .cand-row .cand-item.abbr { border: 2px solid #ff9500; }
        .cand-row .cand-item.prefix { border: 2px solid #007aff; }
        .cand-row .page-info { font-size: 12px; color: var(--apple-secondary); white-space: nowrap; flex-shrink: 0; }

        /* Pinyin display */
        .pinyin-row { margin-bottom: 8px; }
        .pinyin-display {
            background: white; border: 2px solid var(--apple-border); border-radius: 12px;
            padding: 10px 14px; font-size: 20px; color: var(--apple-text);
            min-height: 44px; font-family: "SF Mono", "Fira Code", monospace;
        }
        .pinyin-display.focus { border-color: var(--apple-accent); }
        .segments-row { font-size: 12px; color: var(--apple-accent); margin-bottom: 8px; padding-left: 4px; min-height: 17px; }

        /* Keyboard */
        .keyboard { background: #e5e5ea; padding: 16px; border-radius: 20px; display: flex; flex-direction: column; gap: 8px; user-select: none; margin-top: 12px; }
        .kb-row { display: flex; justify-content: center; gap: 6px; }
        .key { min-width: 48px; height: 52px; background: white; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 3px 0 #d1d1d6; cursor: pointer; transition: all 0.08s; position: relative; padding: 0 8px; }
        .key:active, .key.pressed { transform: translateY(3px); box-shadow: 0 0 0 #d1d1d6; background: var(--apple-accent); color: white; }
        .key.shift-on { background: var(--apple-accent); color: white; }
        .key.filter-on { background: #ff9500; color: white; }
        .key.caps-on { background: #007aff; color: white; }
        .key .char { font-size: 18px; font-weight: 600; }
        .key .sub { font-size: 10px; color: #8e8e93; position: absolute; top: 3px; right: 5px; }
        .key:active .sub, .key.pressed .sub, .key.shift-on .sub, .key.filter-on .sub, .key.caps-on .sub { color: rgba(255,255,255,0.7); }
        .key.wide { min-width: 80px; }
        .key.wider { min-width: 100px; }
        .key.space { min-width: 280px; }

        .help-tip { font-size: 12px; color: var(--apple-secondary); text-align: center; margin-top: 12px; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #34c759; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 600; opacity: 0; transition: opacity 0.3s; z-index: 1000; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast.err { background: #ff3b30; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⌨️ 网页输入法</h1>
            <div class="ime-select">
                <button class="ime-btn active" data-ime="chinese">中文</button>
                <button class="ime-btn" data-ime="english">英文</button>
                <button class="ime-btn" data-ime="japanese">日文</button>
                <button class="ime-btn" data-ime="stroke">笔画</button>
            </div>
        </div>

        <div class="status-bar">
            <span><span class="status-dot" id="statusDot"></span><b id="current-ime">中文</b></span>
            <span>编辑框: <b id="char-count">0</b> 字符</span>
            <span>引擎: <b id="engineStatus">等待</b></span>
        </div>

        <!-- Editor on top -->
        <div class="editor-row">
            <textarea id="editorArea" placeholder="候选字词自动填入此处..."></textarea>
        </div>
        <div class="editor-actions">
            <button class="btn btn-primary" id="btn-copy">📋 复制</button>
            <button class="btn btn-secondary" id="btn-search">🔍 搜索</button>
            <button class="btn btn-secondary" id="btn-clear-editor">🗑️ 清空编辑框</button>
        </div>

        <!-- Candidates (5 per page) -->
        <div class="cand-row">
            <button class="page-btn" id="btnPageUp" disabled title="上一页">&lt;</button>
            <div class="cand-items" id="candItems"></div>
            <button class="page-btn" id="btnPageDown" disabled title="下一页">&gt;</button>
            <span class="page-info" id="pageInfo"></span>
        </div>

        <!-- Pinyin display -->
        <div class="pinyin-row">
            <div class="pinyin-display focus" id="pinyinDisplay" tabindex="0"></div>
        </div>
        <div class="segments-row" id="segments"></div>

        <!-- Virtual keyboard -->
        <div class="keyboard" id="keyboard"></div>
        <div class="help-tip">空格选首词 | 数字1-5选词 | Shift进入辅助码 | Backspace退格 | Enter提交原拼音 | -/=翻页 | Esc重置</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const PAGE_SIZE = 5;
        const KEYBOARD = [
            [
                { id: '`', label: '`', sub: '~' },
                { id: '1', label: '1', sub: '!' },
                { id: '2', label: '2', sub: '@' },
                { id: '3', label: '3', sub: '#' },
                { id: '4', label: '4', sub: '$' },
                { id: '5', label: '5', sub: '%' },
                { id: '6', label: '6', sub: '^' },
                { id: '7', label: '7', sub: '&' },
                { id: '8', label: '8', sub: '*' },
                { id: '9', label: '9', sub: '(' },
                { id: '0', label: '0', sub: ')' },
                { id: '-', label: '-', sub: '_' },
                { id: '=', label: '=', sub: '+' },
                { id: 'Backspace', label: '⌫', className: 'wide' }
            ],
            [
                { id: 'Tab', label: 'Tab', className: 'wide' },
                { id: 'q', label: 'q' }, { id: 'w', label: 'w' },
                { id: 'e', label: 'e' }, { id: 'r', label: 'r' },
                { id: 't', label: 't' }, { id: 'y', label: 'y' },
                { id: 'u', label: 'u' }, { id: 'i', label: 'i' },
                { id: 'o', label: 'o' }, { id: 'p', label: 'p' },
                { id: '[', label: '[', sub: '{' },
                { id: ']', label: ']', sub: '}' },
                { id: '\\', label: '\\', sub: '|' }
            ],
            [
                { id: 'CapsLock', label: 'Caps', className: 'wider' },
                { id: 'a', label: 'a' }, { id: 's', label: 's' },
                { id: 'd', label: 'd' }, { id: 'f', label: 'f' },
                { id: 'g', label: 'g' }, { id: 'h', label: 'h' },
                { id: 'j', label: 'j' }, { id: 'k', label: 'k' },
                { id: 'l', label: 'l' },
                { id: ';', label: ';', sub: ':' },
                { id: "'", label: "'", sub: '"' },
                { id: 'Enter', label: 'Enter', className: 'wider' }
            ],
            [
                { id: 'Shift', label: 'Shift', className: 'wider' },
                { id: 'z', label: 'z' }, { id: 'x', label: 'x' },
                { id: 'c', label: 'c' }, { id: 'v', label: 'v' },
                { id: 'b', label: 'b' }, { id: 'n', label: 'n' },
                { id: 'm', label: 'm' },
                { id: ',', label: ',', sub: '<' },
                { id: '.', label: '.', sub: '>' },
                { id: '/', label: '/', sub: '?' },
                { id: 'Shift', label: 'Shift', className: 'wider' }
            ],
            [
                { id: 'Ctrl', label: 'Ctrl' },
                { id: 'Win', label: 'Win' },
                { id: 'Alt', label: 'Alt' },
                { id: 'Space', label: '空格', className: 'space' },
                { id: 'Alt', label: 'Alt' },
                { id: 'Win', label: 'Win' },
                { id: 'Menu', label: 'Menu' },
                { id: 'Ctrl', label: 'Ctrl' }
            ]
        ];

        // Client state
        let sessionId = null;
        let editorArea = document.getElementById('editorArea');
        let pinyinDiv = document.getElementById('pinyinDisplay');
        let isShift = false;
        let isCapsLock = false;
        let currentIme = 'chinese';
        let allCands = [];
        let candPage = 0;
        let filterActive = false;

        // Key mapping from physical keyboard
        function kbToApi(k) {
            const m = { Backspace: 'backspace', Enter: 'enter', ' ': 'space',
                Shift: 'shift', Escape: 'esc', CapsLock: 'capslock', Tab: 'tab',
                '-': '-', '=': '=', '`': '`', ',': ',', '.': '.',
                '/': '/', ';': ';', "'": "'", '[': '[', ']': ']', '\\': '\\' };
            return m[k] || k.toLowerCase();
        }

        async function api(method, body) {
            const r = await fetch('/api/ime/' + method, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body) });
            if (!r.ok) throw new Error(method + ': ' + r.status);
            return r.json();
        }

        async function initSession() {
            const d = await api('session', {});
            sessionId = d.session_id;
            document.getElementById('engineStatus').textContent = '就绪';
            document.getElementById('statusDot').className = 'status-dot ok';
            applyState(d);
        }

        async function sendKey(key, val, shift, ctrl, alt, extra) {
            if (!sessionId) await initSession();
            const b = { session_id: sessionId, key, val: val || 1,
                shift: shift || false, ctrl: ctrl || false, alt: alt || false };
            if (extra) Object.assign(b, extra);
            applyState(await api('key', b));
        }

        async function selectCandidate(idx) {
            if (!sessionId || idx >= allCands.length) return;
            applyState(await api('key', {
                session_id: sessionId, key: 'digit' + (idx % 10), candidate_index: idx }));
        }

        function applyState(data) {
            pinyinDiv.textContent = data.pinyin_display || '';
            filterActive = data.filter_active;
            let sd = document.getElementById('statusDot');
            sd.className = 'status-dot ok' + (filterActive ? ' filter' : '');

            // Candidates with paging
            allCands = data.candidates || [];
            candPage = 0;
            renderCandPage();

            // Segments
            let segs = data.segments || [];
            document.getElementById('segments').textContent = segs.length ? '分词: ' + segs.join(' ') : '';

            // Action → editor
            if (data.action) {
                let a = data.action, cur = editorArea.selectionStart;
                let bef = editorArea.value.substring(0, cur);
                let aft = editorArea.value.substring(editorArea.selectionEnd);
                if (a.type === 'commit') {
                    editorArea.value = bef + a.text + aft;
                    editorArea.selectionStart = editorArea.selectionEnd = cur + a.text.length;
                } else if (a.type === 'delete_and_emit') {
                    let d = a.delete || 0;
                    let nb = bef.substring(0, Math.max(0, cur - d));
                    editorArea.value = nb + (a.text || '') + aft;
                    editorArea.selectionStart = editorArea.selectionEnd = nb.length + (a.text || '').length;
                }
            }
            document.getElementById('char-count').textContent = editorArea.value.length;
            renderKB();
        }

        function renderCandPage() {
            let container = document.getElementById('candItems');
            let totalPages = Math.ceil(allCands.length / PAGE_SIZE);
            let start = candPage * PAGE_SIZE;
            let page = allCands.slice(start, start + PAGE_SIZE);

            let mc = { 0: '', 1: 'prefix', 2: 'abbr', 3: 'exact' };
            container.innerHTML = page.map((c, i) => {
                let cls = mc[c.match_level] || '';
                let gIdx = start + i;
                return `<div class="cand-item ${cls}" onclick="selectCandidate(${gIdx})">
                    <span class="num">${gIdx + 1}</span>
                    <span>${esc(c.text)}</span>
                    ${c.hint ? `<span class="hint">${esc(c.hint)}</span>` : ''}
                </div>`;
            }).join('');
            for (let i = page.length; i < PAGE_SIZE; i++) {
                container.innerHTML += '<div class="cand-item" style="visibility:hidden;"></div>';
            }

            document.getElementById('btnPageUp').disabled = candPage <= 0;
            document.getElementById('btnPageDown').disabled = candPage >= totalPages - 1;
            document.getElementById('pageInfo').textContent = allCands.length > 0 ?
                (candPage + 1) + '/' + totalPages : '';
        }

        function esc(s) {
            let d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
        }

        // ===== Virtual keyboard =====
        function renderKB() {
            let ct = document.getElementById('keyboard');
            ct.innerHTML = '';
            KEYBOARD.forEach(row => {
                let rd = document.createElement('div'); rd.className = 'kb-row';
                row.forEach(k => {
                    let kd = document.createElement('div');
                    kd.className = 'key ' + (k.className || '');
                    kd.dataset.key = k.id;
                    if (k.id === 'Shift') {
                        if (isShift) kd.classList.add('shift-on');
                        if (filterActive) kd.classList.add('filter-on');
                    }
                    if (k.id === 'CapsLock' && isCapsLock) kd.classList.add('caps-on');
                    kd.innerHTML = `<span class="sub">${k.sub || ''}</span><span class="char">${k.label}</span>`;
                    kd.addEventListener('click', () => keyClick(k));
                    rd.appendChild(kd);
                });
                ct.appendChild(rd);
            });
        }

        async function keyClick(k) {
            let id = k.id;
            if (id === 'Shift') { await sendKey('shift', 1); await sendKey('shift', 0); return; }
            if (id === 'CapsLock') { isCapsLock = !isCapsLock; renderKB(); return; }
            if (['Ctrl','Win','Alt','Menu','Tab'].includes(id)) return;
            await sendKey(id, 1, isShift);
            if (isShift) { isShift = false; renderKB(); }
        }

        // ===== Physical keyboard =====
        document.addEventListener('keydown', async e => {
            if (document.activeElement === editorArea) {
                if (e.key === 'Escape') { e.preventDefault(); editorArea.blur(); pinyinDiv.focus(); }
                return;
            }
            if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
            e.preventDefault();
            let ak = kbToApi(e.key);
            if (e.key === 'Shift') { await sendKey(ak, 1); return; }
            // Convert -, = to minus/equal for page-flip in engine
            if (e.key === '-') ak = '-';
            if (e.key === '=') ak = '=';
            await sendKey(ak, 1, e.shiftKey, e.ctrlKey, e.altKey);
        });
        document.addEventListener('keyup', async e => {
            if (document.activeElement === editorArea) return;
            if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'Shift') await sendKey('shift', 0);
        });

        // ===== Editor =====
        editorArea.addEventListener('focus', () => pinyinDiv.classList.remove('focus'));
        editorArea.addEventListener('blur', () => pinyinDiv.classList.add('focus'));
        editorArea.addEventListener('input', () => {
            document.getElementById('char-count').textContent = editorArea.value.length;
        });

        // ===== Buttons =====
        document.getElementById('btnPageUp').addEventListener('click', () => {
            if (candPage > 0) { candPage--; renderCandPage(); }
        });
        document.getElementById('btnPageDown').addEventListener('click', () => {
            let total = Math.ceil(allCands.length / PAGE_SIZE);
            if (candPage < total - 1) { candPage++; renderCandPage(); }
        });
        document.getElementById('btn-copy').addEventListener('click', async () => {
            let t = editorArea.value;
            if (!t) { showToast('没有内容', true); return; }
            try { await navigator.clipboard.writeText(t); showToast('已复制!'); }
            catch { editorArea.select(); document.execCommand('copy'); showToast('已复制!'); }
        });
        document.getElementById('btn-search').addEventListener('click', () => {
            let t = editorArea.value.trim();
            if (!t) { showToast('没有内容', true); return; }
            window.open('https://www.baidu.com/s?wd=' + encodeURIComponent(t), '_blank');
        });
        document.getElementById('btn-clear-editor').addEventListener('click', () => {
            editorArea.value = '';
            document.getElementById('char-count').textContent = '0';
            pinyinDiv.focus(); showToast('已清空');
        });

        function showToast(msg, err) {
            let t = document.getElementById('toast'); t.textContent = msg;
            t.className = 'toast show' + (err ? ' err' : '');
            setTimeout(() => t.className = 'toast', 2000);
        }

        // ===== IME switch =====
        document.querySelectorAll('.ime-btn').forEach(b => {
            b.addEventListener('click', async () => {
                document.querySelectorAll('.ime-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                currentIme = b.dataset.ime;
                document.getElementById('current-ime').textContent = b.textContent;
                if (sessionId) {
                    await sendKey('a', 1, false, false, false, { profile: currentIme });
                    await sendKey('backspace', 1);
                }
            });
        });

        renderKB();
        pinyinDiv.focus();
        initSession().catch(() => {
            document.getElementById('engineStatus').textContent = '启动失败';
        });
    </script>
    <script src="/static/js/sidebar.js"></script>
</body>
</html>
